version: "3.9"


# ═══════════════════════════════════════════════════
# Cerulean Next — Docker Compose
# ═══════════════════════════════════════════════════


services:


  # ── FastAPI web process ──────────────────────────
  web:
    build:
      context: .
      target: dev
    command: uvicorn cerulean.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - cerulean-data:/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cerulean:cerulean@postgres:5432/cerulean
      - REDIS_URL=redis://redis:6379/0
      - DATA_ROOT=/data/projects
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-changeme-dev-only}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cerulean


  # ── Celery worker ────────────────────────────────
  worker:
    build:
      context: .
      target: dev
    command: >
      celery -A cerulean.tasks.celery_app worker
      --loglevel=info
      --queues=ingest,analyze,transform,dedup,push,sandbox,default
      --concurrency=4
    volumes:
      - .:/app
      - cerulean-data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://cerulean:cerulean@postgres:5432/cerulean
      - REDIS_URL=redis://redis:6379/0
      - DATA_ROOT=/data/projects
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - cerulean


  # ── Celery beat (scheduled tasks) ───────────────
  beat:
    build:
      context: .
      target: dev
    command: >
      celery -A cerulean.tasks.celery_app beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://cerulean:cerulean@postgres:5432/cerulean
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - cerulean


  # ── Flower — Celery monitoring UI ───────────────
  flower:
    build:
      context: .
      target: dev
    command: >
      celery -A cerulean.tasks.celery_app flower
      --port=5555
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - cerulean


  # ── PostgreSQL 15 ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cerulean
      POSTGRES_PASSWORD: cerulean
      POSTGRES_DB: cerulean
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerulean"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cerulean


  # ── Redis 7 ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cerulean


  # ── MinIO (optional S3-compatible file store) ────
  minio:
    # Pinned to RELEASE.2024-11-07T00-52-20Z — update deliberately, not via :latest.
    # Check releases: https://github.com/minio/minio/releases
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cerulean
      MINIO_ROOT_PASSWORD: cerulean123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles:
      - minio   # opt-in: docker compose --profile minio up
    networks:
      - cerulean


volumes:
  postgres-data:
  redis-data:
  minio-data:
  cerulean-data:


networks:
  cerulean:
    driver: bridge
