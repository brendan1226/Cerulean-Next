  const p = state.currentProject;
  try {
    const r = await window.api('POST', `/projects/${p.id}/sandbox/teardown`);
    if (!r) return;
    toast('Sandbox teardown started', 'info');
    setTimeout(() => {
      loadSandboxStatus();
      loadSandboxInstances();
    }, 3000);
  } catch (e) { console.error(e); }
}

// ══════════════════════════════════════════════════════════════════
// Progress bar helper
// ══════════════════════════════════════════════════════════════════
function renderProgressBar(opts = {}) {
  const { percent, label, status, detail } = opts;
  const pct = percent != null ? Math.min(100, Math.max(0, percent)) : null;
  const fillClass = status === 'complete' ? 'complete' : status === 'error' ? 'error' : status === 'paused' ? 'paused' : (pct == null ? 'indeterminate' : '');
  const fillWidth = pct != null ? pct : 100;
  const labelText = label || (pct != null ? `${Math.round(pct)}%` : 'Processing…');
  return `
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill ${fillClass}" style="width:${fillWidth}%"></div>
      <div class="progress-bar-text">${esc(labelText)}</div>
    </div>
    ${detail ? `<div style="font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:2px">${esc(detail)}</div>` : ''}`;
}

// ══════════════════════════════════════════════════════════════════
// Global background task tracker
// ══════════════════════════════════════════════════════════════════
window._bgTasks = {}; // { key: { projectId, taskId, label, stageType, onComplete, status } }

function _showGlobalBar(key, label, progressHtml, detail, actions) {
  const bar = document.getElementById('global-task-bar');
  if (!bar) return;
  bar.classList.add('visible');
  document.getElementById('gtb-label').textContent = label;
  document.getElementById('gtb-progress').innerHTML = progressHtml;
  document.getElementById('gtb-detail').textContent = detail || '';
  document.getElementById('gtb-actions').innerHTML = actions || '';
}

function _hideGlobalBar() {
  const bar = document.getElementById('global-task-bar');
  if (bar) bar.classList.remove('visible');
}

function _parseProgress(r, label) {
  const s = r.state || r.status;
  const prog = r.progress || {};
  const res = r.result || {};
  let pct = null, detail = '', statusType = null, barLabel = `${label}…`;

  if (s === 'SUCCESS') {
    pct = 100; statusType = 'complete';
    barLabel = `${label} complete`;
    detail = [
      res.files_processed ? `${res.files_processed} files` : '',
      res.total_records ? `${res.total_records.toLocaleString()} records` : '',
      res.records_skipped ? `${res.records_skipped} skipped` : '',
    ].filter(Boolean).join(' · ') || 'Done';
  } else if (s === 'FAILURE') {
    pct = 100; statusType = 'error';
    barLabel = `${label} failed`;
    detail = r.error || 'Unknown error';
  } else if (s === 'PAUSED') {
    statusType = 'paused';
    barLabel = `${label} paused`;
    detail = prog.records_done ? `${prog.records_done.toLocaleString()} records` : '';
  } else {
    if (prog.records_done != null) {
      detail = `${prog.records_done.toLocaleString()} records`;
      if (prog.files_done != null && prog.files_total) {
        detail += ` · file ${prog.files_done + 1}/${prog.files_total}`;
        pct = (prog.files_done / prog.files_total) * 100;
      }
      if (prog.current_file) detail += ` · ${prog.current_file}`;
    } else if (prog.records_scanned != null) {
      detail = `${prog.records_scanned.toLocaleString()} scanned`;
    } else if (prog.records_written != null) {
      detail = `${prog.records_written.toLocaleString()} written`;
    } else if (prog.step) {
      detail = prog.step;
    }
  }
  return { pct, detail, statusType, barLabel, state: s };
}

// ══════════════════════════════════════════════════════════════════
// Generic task poller (stage-aware status endpoints)
// ══════════════════════════════════════════════════════════════════
function pollTaskStatus(projectId, taskId, statusElId, label, stageType, onComplete) {
  const taskKey = `${stageType}-${projectId}`;

  // Cancel any existing poll for the same task key
  if (window._bgTasks[taskKey]?._cancel) window._bgTasks[taskKey]._cancel();

  let cancelled = false;
  // Register as background task
  window._bgTasks[taskKey] = {
    projectId, taskId, label, stageType, onComplete, status: 'running',
    _cancel: () => { cancelled = true; },
  };

  const statusEndpoints = {
    transform: `/projects/${projectId}/transform/status?task_id=${taskId}`,
    dedup:     `/projects/${projectId}/dedup/status?task_id=${taskId}`,
    push:      `/projects/${projectId}/push/status?task_id=${taskId}`,
    sandbox:   `/projects/${projectId}/sandbox/status`,
  };
  const statusUrl = statusEndpoints[stageType] || statusEndpoints.transform;

  const poll = async () => {
    if (cancelled) return;
    let finished = false;
    try {
      const r = await window.api('GET', statusUrl);
      if (!r || cancelled) return;
      const p = _parseProgress(r, label);

      // Update inline element if it still exists on page
      const el = document.getElementById(statusElId);
      if (el) {
        el.innerHTML = renderProgressBar({ percent: p.pct, label: p.barLabel, status: p.statusType, detail: p.detail });
      }

      // Always update global bar
      _showGlobalBar(taskKey, label,
        `<div class="progress-bar-wrap" style="height:16px"><div class="progress-bar-fill ${p.statusType || (p.pct == null ? 'indeterminate' : '')}" style="width:${p.pct != null ? p.pct : 100}%"></div></div>`,
        p.detail
      );

      if (p.state === 'SUCCESS') {
        finished = true;
        toast(`${label} complete`, 'success');
        window._bgTasks[taskKey].status = 'complete';
        setTimeout(_hideGlobalBar, 5000);
        delete window._bgTasks[taskKey];
        try { if (onComplete) onComplete(); } catch(e) { console.warn('onComplete error:', e); }
      } else if (p.state === 'FAILURE') {
        finished = true;
        toast(`${label} failed`, 'error');
        window._bgTasks[taskKey].status = 'error';
        setTimeout(_hideGlobalBar, 8000);
        delete window._bgTasks[taskKey];
        try { if (onComplete) onComplete(); } catch(e) { console.warn('onComplete error:', e); }
      }
    } catch (e) { console.warn('poll error:', e); }
    if (!finished && !cancelled) setTimeout(poll, 2000);
  };
  poll();
}

// ══════════════════════════════════════════════════════════════════
// Override navigate — add stage6 + sandbox breadcrumb
// ══════════════════════════════════════════════════════════════════
window.navigate = function(view, params = {}) {
  state.currentView = view;
  Object.assign(state, params);

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  const hasProject = !!state.currentProject;
  document.getElementById('project-nav-label').style.display = hasProject ? '' : 'none';
  document.getElementById('project-nav').style.display = hasProject ? '' : 'none';

  const viewEl = document.getElementById('view');
  const renders = {
    dashboard:     renderDashboard,
    'new-project': renderNewProject,
    stage1:        renderStage1,
    stage2:        renderStage2,
    stage3:        window.renderStage3,
    stage4:        window.renderStage4,
    stage5:        window.renderStage5,
    stage6:        window.renderStage6,
    'project-log': renderProjectLog,
    'project-settings': renderProjectSettings,
    templates:     renderTemplates,
    suggestions:   renderSuggestions,
  };
  const renderer = renders[view];
  if (renderer) renderer(viewEl);
  updateBreadcrumb(view);
};

// ── Init ─────────────────────────────────────────────────────────────
navigate('dashboard');
checkHealth();
setInterval(checkHealth, 30000);
</script>
