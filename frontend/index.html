<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerulean Next</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════
       CERULEAN NEXT — DESIGN SYSTEM (LOCKED)
       ═══════════════════════════════════════════════════════════ */
    :root {
      --cerulean:       #00BCD4;
      --teal:           #26C6DA;
      --cerulean-dim:   rgba(0,188,212,0.08);
      --cerulean-glow:  rgba(0,188,212,0.18);

      --bg-void:        #080C10;
      --bg-deep:        #0D1117;
      --bg-panel:       #111820;
      --bg-card:        #151E28;
      --bg-hover:       #1A2535;
      --bg-active:      #1E2D3D;

      --border:         rgba(0,188,212,0.13);
      --border-mid:     rgba(0,188,212,0.22);
      --border-strong:  rgba(0,188,212,0.38);

      --text-primary:   #E8EDF2;
      --text-secondary: #8899AA;
      --text-dim:       #4A5A6A;

      --green:          #4CAF82;
      --green-dim:      rgba(76,175,130,0.12);
      --amber:          #F5A623;
      --amber-dim:      rgba(245,166,35,0.12);
      --red:            #E05252;
      --red-dim:        rgba(224,82,82,0.12);
      --purple:         #7C4DFF;
      --purple-dim:     rgba(124,77,255,0.12);

      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
      --radius:  4px;
      --radius-lg: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cerulean); }

    /* ── typography ── */
    .mono { font-family: var(--mono); }
    .text-cerulean { color: var(--cerulean); }
    .text-secondary { color: var(--text-secondary); }
    .text-dim { color: var(--text-dim); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }
    .text-red { color: var(--red); }
    .text-purple { color: var(--purple); }

    /* ═══════════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════════ */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-deep);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-logo .wordmark {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cerulean);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-logo .subtitle {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--mono);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .nav-section-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      user-select: none;
    }

    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      color: var(--cerulean);
      border-left-color: var(--cerulean);
      background: var(--cerulean-dim);
    }

    .nav-item .nav-icon {
      font-size: 14px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .stage-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      background: var(--bg-card);
      color: var(--text-dim);
    }

    .nav-item.stage-complete .stage-badge {
      background: var(--green-dim);
      color: var(--green);
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.err { background: var(--red); }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-void);
    }

    /* ── Topbar ── */
    #topbar {
      height: 48px;
      flex-shrink: 0;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    .topbar-breadcrumb {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
      flex: 1;
    }

    .topbar-breadcrumb .crumb-sep { color: var(--text-dim); margin: 0 6px; }
    .topbar-breadcrumb .crumb-active { color: var(--text-primary); }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    /* ── View container ── */
    #view {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px;
    }

    /* ═══════════════════════════════════════════════════════════
       COMPONENTS
       ═══════════════════════════════════════════════════════════ */

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-weight: 500;
    }

    .btn-primary {
      background: var(--cerulean);
      color: var(--bg-void);
    }
    .btn-primary:hover { background: var(--teal); box-shadow: 0 0 12px rgba(0,188,212,0.35); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-mid);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(224,82,82,0.3);
    }
    .btn-danger:hover { background: var(--red-dim); }

    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 500;
    }
    .badge-cerulean { background: var(--cerulean-dim); color: var(--cerulean); border: 1px solid rgba(0,188,212,0.2); }
    .badge-green  { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(76,175,130,0.2); }
    .badge-amber  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid rgba(245,166,35,0.2); }
    .badge-red    { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(224,82,82,0.2); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(124,77,255,0.2); }
    .badge-dim    { background: var(--bg-panel);   color: var(--text-dim); border: 1px solid var(--border); }

    /* ── Form elements ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--cerulean);
      box-shadow: 0 0 0 2px rgba(0,188,212,0.12);
    }
    .form-select { cursor: pointer; }
    .form-textarea { resize: vertical; min-height: 80px; }

    /* ── Table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-mid);
      text-align: left;
    }
    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      vertical-align: middle;
    }
    .data-table tr:hover td { background: var(--bg-hover); }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--cerulean); border-bottom-color: var(--cerulean); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(8,12,16,0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 480px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--cerulean);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .page-title {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--cerulean);
      letter-spacing: 0.04em;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      font-family: var(--sans);
    }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--cerulean);
      line-height: 1;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state .empty-title { font-family: var(--mono); font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state .empty-body { font-size: 12px; max-width: 320px; margin: 0 auto; }

    /* ── Alert boxes ── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .alert-info { background: var(--cerulean-dim); border: 1px solid rgba(0,188,212,0.2); color: var(--cerulean); }
    .alert-warn { background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); }
    .alert-error { background: var(--red-dim); border: 1px solid rgba(224,82,82,0.2); color: var(--red); }

    /* ── Stage pipeline bar ── */
    .pipeline-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      overflow-x: auto;
    }
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .pipeline-stage-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      border: 2px solid var(--border-mid);
      background: var(--bg-deep);
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .pipeline-stage-dot.complete { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .pipeline-stage-dot.active { border-color: var(--cerulean); color: var(--cerulean); background: var(--cerulean-dim); box-shadow: 0 0 8px rgba(0,188,212,0.25); }
    .pipeline-stage-label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
    .pipeline-connector {
      flex: 1;
      min-width: 20px;
      height: 1px;
      background: var(--border);
      margin: 0 8px;
    }
    .pipeline-connector.complete { background: var(--green); opacity: 0.5; }

    /* ── Loading spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--cerulean);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast notifications ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toast-in 0.25s ease;
    }
    @keyframes toast-in { from { transform: translateX(20px); opacity: 0; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.info { border-left: 3px solid var(--cerulean); }
    .toast.warn { border-left: 3px solid var(--amber); }

    /* ═══════════════════════════════════════════════════════════
       VIEWS
       ═══════════════════════════════════════════════════════════ */

    /* ── Dashboard ── */
    .project-list { display: flex; flex-direction: column; gap: 10px; }
    .project-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .project-row:hover { border-color: var(--border-strong); background: var(--bg-hover); }
    .project-code { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--cerulean); width: 120px; flex-shrink: 0; }
    .project-name { flex: 1; font-size: 13px; }
    .project-ils { font-family: var(--mono); font-size: 11px; color: var(--text-dim); width: 180px; flex-shrink: 0; }
    .project-stages { display: flex; gap: 3px; flex-shrink: 0; }
    .stage-pip {
      width: 22px; height: 6px;
      border-radius: 2px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .stage-pip.done { background: var(--green); border-color: var(--green); }
    .stage-pip.active { background: var(--cerulean); border-color: var(--cerulean); }

    /* ── Mapping editor ── */
    .map-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .map-filter-input {
      flex: 1;
      min-width: 180px;
    }
    .map-row-approved { border-left: 2px solid var(--green) !important; }
    .map-row-ai { background: rgba(124,77,255,0.04) !important; }
    .map-row-flagged { border-left: 2px solid var(--amber) !important; }

    /* ── Project log ── */
    .log-terminal {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      height: 520px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
    }
    .log-line { display: flex; gap: 12px; }
    .log-ts { color: var(--text-dim); flex-shrink: 0; }
    .log-tag { flex-shrink: 0; width: 80px; }
    .log-msg { flex: 1; }
    .log-line.level-ok .log-tag, .log-line.level-ok .log-msg { color: var(--green); }
    .log-line.level-warn .log-tag, .log-line.level-warn .log-msg { color: var(--amber); }
    .log-line.level-err .log-tag, .log-line.level-err .log-msg { color: var(--red); }
    .log-line.level-info .log-msg { color: var(--text-primary); }
    .log-line.level-info .log-tag { color: var(--cerulean); }

    /* ── Suggestions board ── */
    .suggestion-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .suggestion-vote {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .vote-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius);

    .vote-btn:hover { border-color: var(--cerulean); color: var(--cerulean); }

    .suggestion-body { flex: 1; }
    .suggestion-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .suggestion-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .suggestion-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>

          <span class="stage-badge" id="badge-s4">—</span>
        </div>
        <div class="nav-item" data-view="stage5" onclick="navigate('stage5')">
          <span class="nav-icon">⑤</span> Push to Koha
          <span class="stage-badge" id="badge-s5">—</span>

  <!-- ── Main ── -->

        <span class="text-dim">cerulean</span>

    </div>
    <div id="view"></div>

</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<!-- ── Modals ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CERULEAN NEXT — FRONTEND SHELL
   Vanilla JS SPA. No build step. No framework.
   API_BASE points to FastAPI. All state in memory.
   ═══════════════════════════════════════════════════════════════════════ */

const API_BASE = window.location.origin + '/api/v1';

// ── XSS escaping ─────────────────────────────────────────────────────
// ALL server-supplied data interpolated into innerHTML MUST go through esc().
// Never interpolate raw API values directly into HTML template strings.
function esc(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── App state ────────────────────────────────────────────────────────
const state = {
  currentView: 'dashboard',
  currentProject: null,   // full project object
  projects: [],
};

// ── Router ──────────────────────────────────────────────────────────
function navigate(view, params = {}) {
  state.currentView = view;
  Object.assign(state, params);

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  // Show/hide project nav
  const hasProject = !!state.currentProject;
  document.getElementById('project-nav-label').style.display = hasProject ? '' : 'none';
  document.getElementById('project-nav').style.display = hasProject ? '' : 'none';

  // Render view
  const viewEl = document.getElementById('view');
  const renders = {
    dashboard:    renderDashboard,
    'new-project': renderNewProject,
    stage1:       renderStage1,
    stage2:       renderStage2,
    stage3:       window.renderStage3,
    stage4:       window.renderStage4,
    stage5:       window.renderStage5,
    'project-log': renderProjectLog,
    templates:    renderTemplates,
    suggestions:  renderSuggestions,
  };
  const renderer = renders[view];
  if (renderer) renderer(viewEl);
  updateBreadcrumb(view);
}

function updateBreadcrumb(view) {
  const labels = {
    dashboard: 'Dashboard',
    'new-project': 'New Project',
    stage1: 'Stage 1 — Data Ingest',
    stage2: 'Stage 2 — Analyze & Map',
    stage3: 'Stage 3 — Transform',
    stage4: 'Stage 4 — Validate & Dedup',
    stage5: 'Stage 5 — Push to Koha',
    stage6: 'Stage 6 — KTD Sandbox',
    'project-log': 'Project Log',
    templates: 'Templates',
    suggestions: 'Suggestions',
  };
  const crumb = document.getElementById('breadcrumb');
  const p = state.currentProject;
  if (p) {
    crumb.innerHTML = `<span class="text-dim">cerulean</span><span class="crumb-sep">/</span><span class="text-cerulean mono">${esc(p.code)}</span><span class="crumb-sep">/</span><span class="crumb-active">${esc(labels[view] || view)}</span>`;
  } else {
    crumb.innerHTML = `<span class="text-dim">cerulean</span><span class="crumb-sep">/</span><span class="crumb-active">${esc(labels[view] || view)}</span>`;
  }
  document.getElementById('topbar-actions').innerHTML = '';
}

// ── API helpers ──────────────────────────────────────────────────────
async function api(method, path, body = null) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${path}`, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.detail?.message || err.message || `HTTP ${res.status}`);
    }
    return res.status === 204 ? null : res.json();
  } catch (e) {
    toast(e.message, 'error');
    throw e;
  }
}

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 4000) {
  const icons = { success: '✓', error: '✕', info: 'ℹ', warn: '⚠' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ── Modal ────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── API health check ─────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res = await fetch(window.location.origin + '/api/health');
    const ok = res.ok;
    document.getElementById('api-dot').className = `status-dot ${ok ? 'ok' : 'err'}`;
    document.getElementById('api-status-text').textContent = ok ? 'API online' : 'API offline';
  } catch {
    document.getElementById('api-dot').className = 'status-dot err';
    document.getElementById('api-status-text').textContent = 'API offline';
  }
}

// ── Pipeline helpers ─────────────────────────────────────────────────
function pipelineBar(project) {
  const stages = [
    { n: 1, label: 'Ingest' },
    { n: 2, label: 'Map' },
    { n: 3, label: 'Transform' },
    { n: 4, label: 'Dedup' },
    { n: 5, label: 'Push' },
    { n: 6, label: 'Sandbox' },
  ];
  return `<div class="pipeline-bar">
    ${stages.map((s, i) => {
      const done = project[`stage_${s.n}_complete`];
      const active = project.current_stage === s.n && !done;
      return `
        ${i > 0 ? `<div class="pipeline-connector${done ? ' complete' : ''}"></div>` : ''}
        <div class="pipeline-stage">
          <div class="pipeline-stage-dot ${done ? 'complete' : active ? 'active' : ''}">
            ${done ? '✓' : s.n}
          </div>
          <div class="pipeline-stage-label">${s.label}</div>
        </div>`;
    }).join('')}
  </div>`;
}

function updateStageBadges(project) {
  for (let i = 1; i <= 6; i++) {
    const badge = document.getElementById(`badge-s${i}`);
    if (!badge) continue;
    const done = project[`stage_${i}_complete`];
    badge.textContent = done ? '✓' : (project.current_stage === i ? '●' : '—');
    badge.parentElement.classList.toggle('stage-complete', done);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════════════════════

// ── Dashboard ────────────────────────────────────────────────────────
async function renderDashboard(el) {
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">All active migration projects</div>
      </div>
      <button class="btn btn-primary" onclick="navigate('new-project')">+ New Project</button>
    </div>
    <div id="project-list-wrap"><div class="spinner"></div></div>`;

  try {
    const projects = await api('GET', '/projects');
    state.projects = projects;
    const wrap = document.getElementById('project-list-wrap');

    if (!projects.length) {
      wrap.innerHTML = `<div class="empty-state">
        <div class="empty-icon">◫</div>
        <div class="empty-title">No projects yet</div>
        <div class="empty-body">Create a new migration project to get started.</div>
      </div>`;
      return;
    }

    wrap.innerHTML = `<div class="project-list">
      ${projects.map(p => `
        <div class="project-row" onclick="openProject(${JSON.stringify(p).replace(/"/g, '&quot;')})">
          <div class="project-code">${esc(p.code)}</div>
          <div class="project-name">${esc(p.library_name)}</div>
          <div class="project-ils mono text-dim">${esc(p.source_ils || '—')}</div>
          <div class="project-stages">
            ${[1,2,3,4,5].map(i => {
              const done = p[`stage_${i}_complete`];
              const active = p.current_stage === i && !done;
              return `<div class="stage-pip ${done ? 'done' : active ? 'active' : ''}" title="Stage ${i}"></div>`;
            }).join('')}
          </div>
          <span class="badge ${p.current_stage === 5 && p.stage_5_complete ? 'badge-green' : 'badge-cerulean'}">
            Stage ${p.current_stage}
          </span>
        </div>`).join('')}
    </div>`;
  } catch (e) {
    console.error('loadProjects failed:', e);
    document.getElementById('project-list-wrap').innerHTML =
      `<div class="alert alert-error">Failed to load projects: ${esc(e.message)}</div>`;
  }
}

function openProject(project) {
  state.currentProject = project;
  updateStageBadges(project);
  navigate('stage1');
}

// ── New Project ───────────────────────────────────────────────────────
function renderNewProject(el) {
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">New Project</div>
        <div class="page-subtitle">Create a new migration project</div>
      </div>
    </div>
    <div class="card" style="max-width:520px">
      <div class="form-group">
        <label class="form-label">Project Code *</label>
        <input class="form-input" id="np-code" placeholder="e.g. westfield_2025" />
      </div>
      <div class="form-group">
        <label class="form-label">Library Name *</label>
        <input class="form-input" id="np-name" placeholder="e.g. Westfield Public Library" />
      </div>
      <div class="form-group">
        <label class="form-label">Koha URL</label>
        <input class="form-input" id="np-url" placeholder="https://koha.library.org" />
      </div>
      <div class="form-group">
        <label class="form-label">Koha API Token</label>
        <input class="form-input" id="np-token" type="password" placeholder="Encrypted at rest" />
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="createProject()">Create Project</button>
        <button class="btn btn-ghost" onclick="navigate('dashboard')">Cancel</button>
      </div>
    </div>`;
}

async function createProject() {
  const code = document.getElementById('np-code').value.trim();
  const name = document.getElementById('np-name').value.trim();
  if (!code || !name) { toast('Code and library name are required', 'warn'); return; }

  try {
    const project = await api('POST', '/projects', {
      code,
      library_name: name,
      koha_url: document.getElementById('np-url').value.trim() || null,
      koha_token: document.getElementById('np-token').value.trim() || null,
    });
    state.currentProject = project;
    updateStageBadges(project);
    toast(`Project "${code}" created`, 'success');
    navigate('stage1');
  } catch (e) { console.error(e); }
}

// ── Stage 1 — Ingest ─────────────────────────────────────────────────
async function renderStage1(el) {
  const p = state.currentProject;
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Stage 1 — Data Ingest</div>
        <div class="page-subtitle">${esc(p.library_name)}</div>
      </div>
    </div>
    ${pipelineBar(p)}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Upload MARC Files</span>
        </div>
        <div class="alert alert-info">Accepted: .mrc, .marc, .mrk, .csv · Max 500 MB per file</div>
        <div id="drop-zone" style="border:2px dashed var(--border-mid);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:all 0.2s"
          onclick="document.getElementById('file-input').click()"
          ondragover="event.preventDefault();this.style.borderColor='var(--cerulean)'"
          ondragleave="this.style.borderColor='var(--border-mid)'"
          ondrop="handleFileDrop(event)">
          <div style="font-size:28px;margin-bottom:8px;opacity:0.4">⇑</div>
          <div class="mono" style="font-size:12px;color:var(--text-secondary)">Drop files here or click to browse</div>
        </div>
        <input type="file" id="file-input" style="display:none" multiple accept=".mrc,.marc,.mrk,.txt,.csv"
          onchange="uploadFiles(this.files)">
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">ILS Detection</span>
        </div>
        <div id="ils-result">
          ${p.source_ils
            ? `<div class="badge badge-cerulean" style="font-size:13px;padding:6px 12px">${esc(p.source_ils)}</div>
               <div class="text-secondary" style="margin-top:8px;font-size:12px">Confidence: ${p.ils_confidence ? Math.round(p.ils_confidence * 100) + '%' : '—'}</div>`
            : `<div class="text-dim" style="font-size:12px">Upload files to trigger automatic ILS detection</div>`
          }
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Files</span>
        <button class="btn btn-ghost btn-sm" onclick="loadFiles()">↻ Refresh</button>
      </div>
      <div id="file-table-wrap"><div class="spinner"></div></div>
    </div>`;

  loadFiles();
}

async function loadFiles() {
  const p = state.currentProject;
  const wrap = document.getElementById('file-table-wrap');
  if (!wrap) return;
  try {
    const files = await api('GET', `/projects/${p.id}/files`);
    if (!files.length) {
      wrap.innerHTML = `<div class="empty-state" style="padding:24px">
        <div class="empty-title">No files uploaded yet</div>
      </div>`;
      return;
    }
    wrap.innerHTML = `<table class="data-table">
      <thead><tr>
        <th>Filename</th><th>Format</th><th>Records</th><th>ILS Signal</th><th>Status</th><th>Tags</th>
      </tr></thead>
      <tbody>
        ${files.map(f => `<tr>
          <td class="mono">${f.filename}</td>
          <td><span class="badge badge-dim">${f.file_format || '—'}</span></td>
          <td class="mono">${f.record_count != null ? f.record_count.toLocaleString() : '—'}</td>
          <td class="text-secondary">${f.ils_signal || '—'}</td>
          <td>${statusBadge(f.status)}</td>
          <td>${f.tag_frequency ? Object.keys(f.tag_frequency).length + ' tags' : '<span class="text-dim">pending</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  } catch (e) { console.error(e); }
}

async function uploadFiles(fileList) {
  const p = state.currentProject;
  for (const file of fileList) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`${API_BASE}/projects/${p.id}/files`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error(await res.text());
      toast(`Uploading ${file.name}… indexing started`, 'info');
    } catch (e) {
      toast(`Upload failed: ${e.message}`, 'error');
    }
  }
  setTimeout(loadFiles, 2000);
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor = 'var(--border-mid)';
  uploadFiles(e.dataTransfer.files);
}

function statusBadge(status) {
  const map = {
    uploaded: 'badge-dim',
    indexing: 'badge-amber',
    indexed:  'badge-green',
    error:    'badge-red',
  };
  return `<span class="badge ${map[status] || 'badge-dim'}">${status}</span>`;
}

// ── Stage 2 — Analyze & Map ───────────────────────────────────────────
async function renderStage2(el) {
  const p = state.currentProject;
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Stage 2 — Analyze &amp; Map</div>
        <div class="page-subtitle">${p.library_name}</div>
      </div>
    </div>
    ${pipelineBar(p)}
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchMapTab('editor', this)">Mapping Editor</button>
      <button class="tab-btn" onclick="switchMapTab('ai', this)">AI Suggestions</button>
      <button class="tab-btn" onclick="switchMapTab('templates', this)">Templates</button>
      <button class="tab-btn" onclick="switchMapTab('viewer', this)">Record Viewer</button>
    </div>
    <div id="map-tab-content"></div>`;

  renderMapEditorTab();
}

function switchMapTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const fns = {
    editor: renderMapEditorTab,
    ai:     renderAISuggestionsTab,
    templates: renderTemplatesTab,
    viewer: renderRecordViewerTab,
  };
  (fns[tab] || renderMapEditorTab)();
}

async function renderMapEditorTab() {
  const p = state.currentProject;
  const content = document.getElementById('map-tab-content');
  content.innerHTML = `
    <div class="map-toolbar">
      <input class="form-input map-filter-input" id="map-filter" placeholder="Filter by tag…" oninput="filterMaps(this.value)">
      <select class="form-select" style="width:150px" onchange="filterMaps(document.getElementById('map-filter').value, this.value)">
        <option value="">All</option>
        <option value="approved">Approved</option>
        <option value="pending">Pending AI</option>
        <option value="manual">Manual (unapproved)</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="openNewMapModal()">+ Add Map</button>
      <button class="btn btn-ghost btn-sm" onclick="openLoadTemplateModal()">⇄ Load Template</button>
      <button class="btn btn-ghost btn-sm" onclick="approveAll()">✓ Approve All</button>
    </div>
    <div id="map-table-wrap"><div class="spinner"></div></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="openSaveTemplateModal()">⊞ Save as Template</button>
    </div>`;

  loadMaps();
}

async function loadMaps(filter = '') {
  const p = state.currentProject;
  const wrap = document.getElementById('map-table-wrap');
  if (!wrap) return;
  try {
    let url = `/projects/${p.id}/maps`;
    if (filter) url += `?status=${filter}`;
    const maps = await api('GET', url);

    if (!maps.length) {
      wrap.innerHTML = `<div class="empty-state" style="padding:32px">
        <div class="empty-title">No maps yet</div>
        <div class="empty-body">Add maps manually, load a template, or run AI Suggestions.</div>
      </div>`;
      return;
    }

    wrap.innerHTML = `<table class="data-table">
      <thead><tr>
        <th>Source</th><th>→</th><th>Target</th><th>Transform</th><th>Origin</th><th>Confidence</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody id="map-rows">
        ${maps.map(m => mapRow(m)).join('')}
      </tbody>
    </table>`;
  } catch (e) { console.error(e); }
}

function mapRow(m) {
  const origin = m.source_label.startsWith('template')
    ? `<span class="badge badge-cerulean">template</span>`
    : m.ai_suggested
    ? `<span class="badge badge-purple">AI</span>`
    : `<span class="badge badge-dim">manual</span>`;

  const conf = m.ai_confidence != null
    ? `<span class="${m.ai_confidence >= 0.7 ? 'text-green' : m.ai_confidence >= 0.4 ? 'text-amber' : 'text-red'} mono">${Math.round(m.ai_confidence * 100)}%</span>`
    : `<span class="text-dim">—</span>`;

  const rowClass = m.approved ? 'map-row-approved' : m.ai_suggested ? 'map-row-ai' : '';

  return `<tr class="${rowClass}" id="map-${esc(m.id)}">
    <td class="mono text-cerulean">${esc(m.source_tag)}${m.source_sub ? esc(m.source_sub) : ''}</td>
    <td class="text-dim">→</td>
    <td class="mono">${esc(m.target_tag)}${m.target_sub ? esc(m.target_sub) : ''}</td>
    <td><span class="badge badge-dim">${esc(m.transform_type)}</span></td>
    <td>${origin}</td>
    <td>${conf}</td>
    <td>${m.approved ? '<span class="badge badge-green">approved</span>' : '<span class="badge badge-amber">pending</span>'}</td>
    <td style="display:flex;gap:4px">
      ${!m.approved ? `<button class="btn btn-ghost btn-sm" data-map-id="${esc(m.id)}" onclick="approveMap(this.dataset.mapId,this)">✓</button>` : ''}
      <button class="btn btn-ghost btn-sm" data-map-id="${esc(m.id)}" onclick="deleteMap(this.dataset.mapId,this)">✕</button>
    </td>
  </tr>`;
}

async function loadLog() {
  const p = state.currentProject;
  const stage = document.getElementById('log-stage-filter')?.value || '';
  const level = document.getElementById('log-level-filter')?.value || '';
  const term = document.getElementById('log-terminal');
  if (!term) return;

  try {
    let url = `/projects/${p.id}/log?limit=500`;
    if (stage) url += `&stage=${stage}`;
    if (level) url += `&level=${level}`;
    const data = await api('GET', url);

    if (!data.items.length) {
      term.innerHTML = `<div class="text-dim">No log entries found.</div>`;
      return;
    }

    const levelClass = { info: 'level-info', warn: 'level-warn', error: 'level-err', complete: 'level-ok' };
    term.innerHTML = data.items.slice().reverse().map(e =>
      `<div class="log-line ${levelClass[e.level] || 'level-info'}">
        <span class="log-ts">${new Date(e.created_at).toISOString().slice(11,19)}</span>
        <span class="log-tag">${e.tag || (e.stage ? `[s${e.stage}]` : '[sys]')}</span>
        <span class="log-msg">${e.message}</span>
      </div>`
    ).join('');

    // Summary counts
    const counts = data.items.reduce((acc, e) => { acc[e.level] = (acc[e.level]||0)+1; return acc; }, {});
    const summary = document.getElementById('log-summary');
    if (summary) {
      summary.innerHTML = `
        <span class="text-green">✓ ${counts.complete||0} complete</span>
        <span class="text-dim">· ${counts.info||0} info</span>
        <span class="text-amber">· ${counts.warn||0} warnings</span>
        <span class="text-red">· ${counts.error||0} errors</span>
        <span class="text-dim">· ${data.total} total</span>`;
    }
  } catch (e) { console.error(e); }
}

    <div class="page-header">
      <div>
        <div class="page-title">Suggestions &amp; Feedback</div>
        <div class="page-subtitle">Feature requests, bugs, and workflow ideas</div>
      </div>
      <button class="btn btn-primary" onclick="openNewSuggestionModal()">+ Submit</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <select class="form-select" style="width:160px" id="sg-type-filter" onchange="loadSuggestions()">
        <option value="">All types</option>
        <option value="feature">Feature</option>
        <option value="bug">Bug</option>
        <option value="workflow">Workflow</option>
        <option value="discussion">Discussion</option>
      </select>
      <select class="form-select" style="width:160px" id="sg-status-filter" onchange="loadSuggestions()">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="confirmed">Confirmed</option>
        <option value="in_progress">In Progress</option>
        <option value="shipped">Shipped</option>
      </select>
    </div>
    <div id="suggestions-list"><div class="spinner"></div></div>`;

  loadSuggestions();
}

async function loadSuggestions() {
  const type = document.getElementById('sg-type-filter')?.value || '';
  const status = document.getElementById('sg-status-filter')?.value || '';
  const wrap = document.getElementById('suggestions-list');
  if (!wrap) return;

  try {
    let url = '/suggestions';
    const params = [];
    if (type) params.push(`type=${type}`);
    if (status) params.push(`status=${status}`);
    if (params.length) url += '?' + params.join('&');

    const items = await api('GET', url);
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">No suggestions found</div></div>`;
      return;
    }

    const typeBadge = { feature: 'badge-cerulean', bug: 'badge-red', workflow: 'badge-green', discussion: 'badge-amber' };
    const statusBadge2 = { open: 'badge-dim', confirmed: 'badge-cerulean', in_progress: 'badge-amber', shipped: 'badge-green', closed: 'badge-dim' };

    wrap.innerHTML = items.map(s => `
      <div class="suggestion-card" style="border-left:3px solid ${s.type==='feature'?'var(--cerulean)':s.type==='bug'?'var(--red)':s.type==='workflow'?'var(--green)':'var(--amber)'}">
        <div class="suggestion-vote">
          <button class="vote-btn" data-suggestion-id="${esc(s.id)}" onclick="voteSuggestion(this.dataset.suggestionId, this)">▲</button>
          <div class="vote-count">${s.vote_count}</div>
        </div>
        <div class="suggestion-body">
          <div class="suggestion-title">${esc(s.title)}</div>
          <div class="suggestion-desc">${esc(s.body)}</div>
          <div class="suggestion-meta">
            <span class="badge ${typeBadge[s.type] || 'badge-dim'}">${esc(s.type)}</span>
            <span class="badge ${statusBadge2[s.status] || 'badge-dim'}">${esc(s.status)}</span>
            ${s.submitted_by ? `<span class="text-dim" style="font-size:11px">${esc(s.submitted_by)}</span>` : ''}
            <span class="text-dim" style="font-size:11px">${new Date(s.created_at).toLocaleDateString()}</span>
          </div>
        </div>
      </div>`).join('');
  } catch (e) {
    console.error('loadSuggestions failed:', e);
    if (wrap) wrap.innerHTML = `<div class="empty-state"><div class="empty-title">Failed to load — try refreshing</div></div>`;
  }
}

async function voteSuggestion(id, btn) {
  // User identity is derived from the JWT on the server — do not pass email as a parameter.
  if (btn) btn.disabled = true;
  try {
    const res = await api('POST', `/suggestions/${id}/vote`);
    btn.classList.toggle('voted', res.voted);
    btn.nextElementSibling.textContent = res.vote_count;
  } catch (e) {
    console.error('voteSuggestion failed:', e);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function openNewSuggestionModal() {
  openModal(`
    <div class="modal-title">Submit Suggestion</div>
    <div class="form-group">
      <label class="form-label">Type *</label>
      <select class="form-select" id="ns-type">
        <option value="feature">Feature Request</option>
        <option value="bug">Bug Report</option>
        <option value="workflow">Workflow Idea</option>
        <option value="discussion">Discussion</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="ns-title" placeholder="Short summary">
    </div>
    <div class="form-group">
      <label class="form-label">Details *</label>
      <textarea class="form-textarea" id="ns-body" placeholder="Describe the idea, bug, or workflow improvement"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitSuggestion()">Submit</button>

}

async function submitSuggestion() {
  const title = document.getElementById('ns-title').value.trim();
  const body = document.getElementById('ns-body').value.trim();
  if (!title || !body) { toast('Title and details are required', 'warn'); return; }
  try {
    await api('POST', '/suggestions', {
      type: document.getElementById('ns-type').value,
      title,
      body,
    });
    closeModal();
    toast('Suggestion submitted', 'success');
    loadSuggestions();
  } catch (e) { console.error(e); }
}

// CERULEAN NEXT — STAGE 3, 4, 5, 6 + AUTH

// ── Auth state ─────────────────────────────────────────────────────
let _authToken = sessionStorage.getItem('cerulean_token') || '';

// Override api() to include auth header
window.api = async function(method, path, body = null) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        ..._authToken ? { 'Authorization': `Bearer ${_authToken}` } : {},
      },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${path}`, opts);
    if (res.status === 401) { showLoginModal(); return null; }
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.detail?.message || err.message || `HTTP ${res.status}`);
    }
    return res.status === 204 ? null : res.json();
  } catch (e) {
    toast(e.message, 'error');
    throw e;
  }
};

function showLoginModal() {
  openModal(`
    <div class="modal-title">Sign In</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="login-user" value="admin" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-pass" value="admin" />
    </div>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-bottom:8px"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    </div>`);
}

async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  try {
    const res = await fetch(`${API_BASE}/auth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p }),
    });
    if (!res.ok) {
      document.getElementById('login-err').textContent = 'Invalid credentials';
      return;
    }
    const data = await res.json();
    _authToken = data.access_token;
    sessionStorage.setItem('cerulean_token', _authToken);
    closeModal();
    toast('Signed in', 'success');
    navigate(state.currentView);
  } catch (e) {
    document.getElementById('login-err').textContent = e.message;
  }
}

window.renderStage3 = async function(el) {
  const p = state.currentProject;
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Stage 3 — Transform &amp; Merge</div>

    <div class="tab-bar">

};

function switchS3Tab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ({ transform: renderS3Transform, merge: renderS3Merge, manifest: renderS3Manifest })[tab]();
}

function renderS3Transform() {
  document.getElementById('s3-tab').innerHTML = `
    <div class="alert alert-info">
      Transform applies your approved field maps to every indexed MARC file.
      Transformed files are saved alongside originals as {name}_transformed.mrc.

      <p class="text-secondary" style="font-size:12px;margin-bottom:16px">

      </p>
      <button class="btn btn-primary" onclick="runTransform()">▶ Start Transform</button>
      <div id="transform-status" style="margin-top:12px"></div>
    </div>`;
}

async function runTransform() {
  const p = state.currentProject;
  try {
    const r = await window.api('POST', `/projects/${p.id}/transform/start`);
    if (!r) return;
    document.getElementById('transform-status').innerHTML =
      `<span class="badge badge-amber">Running</span> <span class="mono text-dim">task: ${r.task_id.slice(0,8)}…</span>`;
    pollTaskStatus(p.id, r.task_id, 'transform-status', 'transform', 'transform');
  } catch (e) { console.error(e); }
}

function renderS3Merge() {
  const p = state.currentProject;
  document.getElementById('s3-tab').innerHTML = `
    <div class="alert alert-info">
      Merge combines all transformed files into a single merged.mrc.
      Optionally join an items CSV to embed 952 fields.
    </div>
    <div class="card" style="max-width:560px">
      <div class="card-header"><span class="card-title">Merge Files</span></div>
      <div class="form-group">
        <label class="form-label">File IDs (one per line, in merge order — leave blank for all)</label>
        <textarea class="form-textarea" id="merge-file-ids" placeholder="file-uuid-1&#10;file-uuid-2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Items CSV Path (optional)</label>
        <input class="form-input" id="merge-csv" placeholder="/data/projects/${p.id}/items.csv">
      </div>
      <div class="form-group">
        <label class="form-label">Items CSV key column (matches bib 001)</label>
        <input class="form-input" id="merge-bib-key" value="biblionumber">
      </div>
      <button class="btn btn-primary" onclick="runMerge()">▶ Start Merge</button>
      <div id="merge-status" style="margin-top:12px"></div>
    </div>`;
}

async function runMerge() {
  const p = state.currentProject;
  let ids = document.getElementById('merge-file-ids').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
  if (!ids.length) {
    const files = await window.api('GET', `/projects/${p.id}/files`);
    if (!files) return;
    ids = files.filter(f => f.status === 'indexed').map(f => f.id);
  }
  try {
    const r = await window.api('POST', `/projects/${p.id}/transform/merge`, {
      file_ids: ids,
      items_csv_path: document.getElementById('merge-csv').value.trim() || null,
      items_csv_key_column: document.getElementById('merge-bib-key').value.trim() || 'biblionumber',
    });
    if (!r) return;
    document.getElementById('merge-status').innerHTML =
      `<span class="badge badge-amber">Running</span> <span class="mono text-dim">${ids.length} files, task: ${r.task_id.slice(0,8)}…</span>`;
    pollTaskStatus(p.id, r.task_id, 'merge-status', 'merge', 'transform');
  } catch (e) { console.error(e); }
}

async function renderS3Manifest() {
  const p = state.currentProject;
  const wrap = document.getElementById('s3-tab');
  wrap.innerHTML = `<div class="spinner"></div>`;
  try {
    const manifests = await window.api('GET', `/projects/${p.id}/transform/manifest`);
    if (!manifests || !manifests.length) {
      wrap.innerHTML = `<div class="alert alert-warn">No manifest yet — run Merge first.</div>`;
      return;
    }
    const m = manifests[0]; // most recent
    wrap.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Total Records</div><div class="stat-value">${(m.total_records||0).toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Items Joined</div><div class="stat-value">${(m.items_joined||0).toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Files Processed</div><div class="stat-value">${m.files_processed||0}</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Latest ${esc(m.task_type)} Run</span>
          <span class="badge ${m.status==='complete'?'badge-green':m.status==='error'?'badge-red':'badge-amber'}">${esc(m.status)}</span>
        </div>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--text-secondary)">
          <span>Type: ${esc(m.task_type)}</span>
          <span>·</span>
          <span>Output: ${esc(m.output_path || '—')}</span>
          <span>·</span>
          <span>Started: ${m.started_at ? new Date(m.started_at).toLocaleString() : '—'}</span>
        </div>
        ${m.error_message ? `<div class="alert alert-error" style="margin-top:12px">${esc(m.error_message)}</div>` : ''}
        ${m.duplicate_001s?.length ? `<div class="alert alert-warn" style="margin-top:12px">${m.duplicate_001s.length} duplicate 001 values detected — review in Stage 4</div>` : ''}
      </div>`;
  } catch {
    wrap.innerHTML = `<div class="alert alert-warn">No manifest yet — run Merge first.</div>`;
  }
}

function switchS4Tab(tab, btn) {

async function renderS4Rules() {
  const wrap = document.getElementById('s4-tab');
  wrap.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-primary btn-sm" onclick="openNewRuleModal()">+ New Rule</button>

    </div>

  loadRules();
}

async function loadRules() {
  const p = state.currentProject;
  const wrap = document.getElementById('rules-list');
  if (!wrap) return;
  try {
    const rules = await window.api('GET', `/projects/${p.id}/dedup/rules`);
    if (!rules || !rules.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">No rules yet</div><div class="empty-body">Create a rule or use "Create All Presets" to add the standard four.</div></div>`;
      return;
    }
    wrap.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px">
      ${rules.map(r => `
        <div class="card" style="border-left:3px solid ${r.active ? 'var(--cerulean)' : 'var(--border)'}">
          <div class="card-header">
            <div>
              <span class="mono" style="font-weight:600">${esc(r.name)}</span>
              ${r.active ? '<span class="badge badge-cerulean" style="margin-left:8px">active</span>' : ''}
              ${r.preset_key ? `<span class="badge badge-dim" style="margin-left:8px">${esc(r.preset_key)}</span>` : ''}
              <span class="badge badge-dim" style="margin-left:8px">${esc(r.on_duplicate)}</span>
            </div>
            <div style="display:flex;gap:6px">
              ${!r.active ? `<button class="btn btn-ghost btn-sm" data-rule-id="${esc(r.id)}" onclick="activateRule(this.dataset.ruleId)">Activate</button>` : ''}
              <button class="btn btn-ghost btn-sm" data-rule-id="${esc(r.id)}" onclick="runScan(this.dataset.ruleId)">▶ Scan</button>
              ${r.last_scan_clusters != null ? `<button class="btn btn-primary btn-sm" data-rule-id="${esc(r.id)}" onclick="runApply(this.dataset.ruleId)">Apply</button>` : ''}
              <button class="btn btn-danger btn-sm" data-rule-id="${esc(r.id)}" onclick="deleteRule(this.dataset.ruleId)">✕</button>
            </div>
          </div>
          ${r.last_scan_clusters != null ? `
            <div style="display:flex;gap:16px;font-size:12px;color:var(--text-secondary)">
              <span>${r.last_scan_clusters?.toLocaleString()} clusters</span>
              <span>·</span>
              <span>${r.last_scan_affected?.toLocaleString()} affected</span>
              <span>·</span>
              <span>Last scan: ${r.last_scan_at ? new Date(r.last_scan_at).toLocaleString() : '—'}</span>
            </div>` : '<div class="text-dim" style="font-size:12px">Not yet scanned</div>'}
          <div id="rule-status-${r.id}" style="margin-top:8px"></div>
        </div>`).join('')}

  } catch (e) { console.error(e); }
}

async function createPresets() {

  try {
    const created = await window.api('POST', `/projects/${p.id}/dedup/presets`);

    toast(`Created ${created.length} preset rules`, 'success');
    loadRules();
  } catch (e) { console.error(e); }

async function activateRule(ruleId) {
  const p = state.currentProject;

}

async function deleteRule(ruleId) {

  await window.api('DELETE', `/projects/${p.id}/dedup/rules/${ruleId}`);
  toast('Rule deleted', 'success');
  loadRules();
}

async function runScan(ruleId) {
  const p = state.currentProject;
  const r = await window.api('POST', `/projects/${p.id}/dedup/scan`, { rule_id: ruleId });

  toast('Dedup scan started', 'info');
  pollTaskStatus(p.id, r.task_id, `rule-status-${ruleId}`, 'dedup-scan', 'dedup', () => loadRules());

async function runApply(ruleId) {
  const p = state.currentProject;
  const r = await window.api('POST', `/projects/${p.id}/dedup/apply`, { rule_id: ruleId });
  if (!r) return;
  toast('Dedup apply started', 'info');
  pollTaskStatus(p.id, r.task_id, `rule-status-${ruleId}`, 'dedup-apply', 'dedup', () => loadRules());
}

function openNewRuleModal() {
  openModal(`
    <div class="modal-title">New Dedup Rule</div>
    <div class="form-group">

async function submitNewRule() {
  const p = state.currentProject;
  const name = document.getElementById('nr-name').value.trim();
  if (!name) { toast('Name required', 'warn'); return; }
  try {
    await window.api('POST', `/projects/${p.id}/dedup/rules`, {
      name,
      preset_key: document.getElementById('nr-preset').value,
      on_duplicate: document.getElementById('nr-action').value,

async function renderS4Clusters() {
  const p = state.currentProject;
  const wrap = document.getElementById('s4-tab');
  const rules = await window.api('GET', `/projects/${p.id}/dedup/rules`);
  const active = rules?.find(r => r.active);
  if (!active) {
    wrap.innerHTML = `<div class="alert alert-warn">Activate a rule first, then run a scan to see clusters.</div>`;
    return;
  }
  wrap.innerHTML = `<div class="spinner"></div>`;
  try {
    const data = await window.api('GET', `/projects/${p.id}/dedup/clusters?rule_id=${active.id}&resolved=false&limit=100`);
    const clusters = data?.items || [];
    const total = data?.total || 0;
    if (!clusters.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">No open clusters</div><div class="empty-body">Run a scan to detect duplicates.</div></div>`;
      return;
    }
    wrap.innerHTML = `
      <div class="alert alert-info">${total} total open clusters (showing ${clusters.length}). Use Apply to resolve all automatically.</div>
      <table class="data-table">
        <thead><tr><th>Match Key</th><th>Records</th><th>Primary</th><th>Action</th></tr></thead>
        <tbody>
          ${clusters.map(c => `<tr>
            <td class="mono text-dim" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(c.match_key || '—')}</td>
            <td>${c.records?.length}</td>
            <td class="mono">${esc(c.records?.[c.primary_index]?.marc_001 || 'idx:' + c.primary_index)}</td>

async function loadSandboxStatus() {

    const status = await window.api('GET', `/projects/${p.id}/sandbox/status`);
    if (!status || status.state === 'none') {
      wrap.innerHTML = `
        <p class="text-secondary" style="font-size:12px;margin-bottom:16px">No active sandbox. Provision a KTD container to test your Koha migration.</p>
        <div class="form-group">
          <label class="form-label">Koha Version (optional)</label>
          <input class="form-input" id="sandbox-version" placeholder="master (default)">
        </div>
        <button class="btn btn-primary" onclick="provisionSandbox()">▶ Provision Sandbox</button>`;
    } else if (status.state === 'PROGRESS' || status.state === 'PENDING' || status.state === 'STARTED') {
      const step = status.progress?.step || 'starting';
      wrap.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px">
          <div class="spinner" style="width:16px;height:16px"></div>
          <span class="badge badge-amber">Provisioning</span>

      const r = status.result || {};
      if (r.status === 'running') {
        wrap.innerHTML = `
          <div style="margin-bottom:12px">
            <span class="badge badge-green">Running</span>
            <span class="mono text-secondary" style="margin-left:8px">${esc(r.container_name || '')}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-secondary)">
            <div>Container: <span class="mono">${esc(r.container_id || '—')}</span></div>
            <div>URL: <a href="${esc(r.koha_url || '#')}" target="_blank" class="text-cerulean">${esc(r.koha_url || '—')}</a></div>
            <div>Port: <span class="mono">${r.port || '—'}</span></div>

          <button class="btn btn-danger" style="margin-top:16px" onclick="teardownSandbox()">■ Teardown</button>`;
      } else {
        wrap.innerHTML = `

          <button class="btn btn-primary" style="margin-top:12px" onclick="provisionSandbox()">▶ Retry Provision</button>`;
      }
    } else if (status.state === 'FAILURE') {
      wrap.innerHTML = `
        <div class="alert alert-error">${esc(status.error || 'Provision failed')}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="provisionSandbox()">▶ Retry Provision</button>`;
    } else {
      // stopped or other
      wrap.innerHTML = `

        <div class="form-group">
          <label class="form-label">Koha Version (optional)</label>

        </div>
        <button class="btn btn-primary" onclick="provisionSandbox()">▶ Provision Sandbox</button>`;
    }
  } catch (e) {
    wrap.innerHTML = `

        <label class="form-label">Koha Version (optional)</label>

// ══════════════════════════════════════════════════════════════════
// Generic task poller (stage-aware status endpoints)
// ══════════════════════════════════════════════════════════════════
function pollTaskStatus(projectId, taskId, statusElId, label, stageType, onComplete) {
  const el = document.getElementById(statusElId);
  if (!el) return;

  // Use correct status endpoint per stage
  const statusEndpoints = {
    transform: `/projects/${projectId}/transform/status?task_id=${taskId}`,
    dedup:     `/projects/${projectId}/dedup/status?task_id=${taskId}`,
    push:      `/projects/${projectId}/push/status?task_id=${taskId}`,
    sandbox:   `/projects/${projectId}/sandbox/status`,
  };
  const statusUrl = statusEndpoints[stageType] || statusEndpoints.transform;

  const poll = async () => {
    try {
      const r = await window.api('GET', statusUrl);
      if (!r) return;
      const s = r.state || r.status;
      if (s === 'SUCCESS') {
        const resultStr = r.result ? JSON.stringify(r.result).slice(0, 120) : '';
        el.innerHTML = `<span class="badge badge-green">Complete</span> <span class="text-dim mono" style="font-size:11px">${esc(resultStr)}</span>`;
        toast(`${label} complete`, 'success');
        if (onComplete) onComplete();
      } else if (s === 'FAILURE') {
        el.innerHTML = `<span class="badge badge-red">Failed</span> <span class="text-red" style="font-size:12px">${esc(r.error || 'error')}</span>`;
        toast(`${label} failed`, 'error');
      } else {
        const prog = r.progress;
        let progText = '';
        if (prog) {
          if (prog.records_done) progText = ` — ${prog.records_done.toLocaleString()} records`;
          else if (prog.records_scanned) progText = ` — ${prog.records_scanned.toLocaleString()} scanned`;
          else if (prog.records_written) progText = ` — ${prog.records_written.toLocaleString()} written`;
          else if (prog.step) progText = ` — ${prog.step}`;
        }
        el.innerHTML = `<span class="badge badge-amber">Running</span><span class="text-dim mono" style="margin-left:8px">${esc(s)}${progText}</span>`;
        setTimeout(poll, 2000);
      }
    } catch { setTimeout(poll, 3000); }
  };
  poll();
}

window.navigate = function(view, params = {}) {
  state.currentView = view;
  Object.assign(state, params);

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  const hasProject = !!state.currentProject;
  document.getElementById('project-nav-label').style.display = hasProject ? '' : 'none';
  document.getElementById('project-nav').style.display = hasProject ? '' : 'none';

  const viewEl = document.getElementById('view');
  const renders = {
    dashboard:     renderDashboard,
    'new-project': renderNewProject,
    stage1:        renderStage1,
    stage2:        renderStage2,
    stage3:        window.renderStage3,
    stage4:        window.renderStage4,
    stage5:        window.renderStage5,
    stage6:        window.renderStage6,
    'project-log': renderProjectLog,
    templates:     renderTemplates,
    suggestions:   renderSuggestions,
  };
  const renderer = renders[view];
  if (renderer) renderer(viewEl);
  updateBreadcrumb(view);
};
