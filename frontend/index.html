        ${_transformOptions(encodedTransform)}
      </select>${needsConfig ? `<button class="btn btn-ghost btn-sm" style="font-size:9px;padding:1px 4px;margin-left:2px;vertical-align:middle" onclick="openTransformConfig('${m.id}')" title="Configure transform">${esc(configSummary)}</button>` : ''}
    </td>
    <td style="text-align:center">
      <input type="checkbox" ${m.is_controlled_list ? 'checked' : ''}

    </td>
    <td>${confBadge}</td>
    <td>${m.approved
      ? '<span class="badge badge-green" style="cursor:pointer" title="Click to unapprove" onclick="patchPatronMapField(\'' + m.id + '\',\'approved\',false)">approved</span>'

    openModal(`
      <h3 style="margin-bottom:4px">Split Config</h3>
      <p class="text-secondary" style="font-size:12px;margin-bottom:16px">
        Source: <strong class="mono">${esc(m.source_column)}</strong> &rarr; <strong class="mono">${esc(m.target_header || '?')}</strong>
      </p>
      <div class="form-group">
        <label class="form-label">Delimiter</label>
        <select class="form-select" id="pm-cfg-delimiter" style="font-size:12px">

async function saveTransformConfig(mapId, type) {
  const p = state.currentProject;
  let config = {};
  if (type === 'regex') {
    config = {
      pattern: document.getElementById('pm-cfg-pattern')?.value || '',
      replacement: document.getElementById('pm-cfg-replacement')?.value || '',
    };
  } else if (type === 'const') {
    config = { value: document.getElementById('pm-cfg-value')?.value || '' };
  } else if (type === 'split') {
    config = {
      delimiter: document.getElementById('pm-cfg-delimiter')?.value || ' ',
      index: parseInt(document.getElementById('pm-cfg-index')?.value) || 0,
    };
  }
  try {
    const updated = await window.api('PATCH', `/projects/${p.id}/patrons/maps/${mapId}`, {
      transform_config: config,
    });
    const idx = _patronMaps.findIndex(m => m.id === mapId);
    if (idx !== -1 && updated) _patronMaps[idx] = updated;
    const tr = document.querySelector(`tr[data-map-id="${mapId}"]`);
    if (tr && updated) tr.outerHTML = _patronMapRow(updated);
    closeModal();
    toast('Config saved', 'success');
  } catch(e) {
    toast(e.message || 'Save failed', 'error');
  }
}

async function patchPatronMapField(mapId, field, value) {
  const p = state.currentProject;
  const body = {};
  body[field] = value;
  // Auto-set ignored when header is cleared, auto-detect controlled list
  if (field === 'target_header') {
    body.ignored = !value;
    if (PATRON_CONTROLLED_HEADERS.includes(value)) {
      body.is_controlled_list = true;
    } else {
      body.is_controlled_list = false;
    }
  }
  try {
    const updated = await window.api('PATCH', `/projects/${p.id}/patrons/maps/${mapId}`, body);
    const idx = _patronMaps.findIndex(m => m.id === mapId);
    if (idx !== -1 && updated) _patronMaps[idx] = updated;
    const tr = document.querySelector(`tr[data-map-id="${mapId}"]`);
    if (tr && updated) tr.outerHTML = _patronMapRow(updated);
  } catch(e) {
    toast(e.message || 'Update failed', 'error');
  }
}

async function patchPatronMapTransform(mapId, encodedValue) {
  const p = state.currentProject;
  const { transform_type, transform_config } = _decodeTransform(encodedValue);
  try {
    const updated = await window.api('PATCH', `/projects/${p.id}/patrons/maps/${mapId}`, {
      transform_type,
      transform_config,

    if (idx !== -1 && updated) _patronMaps[idx] = updated;
    const tr = document.querySelector(`tr[data-map-id="${mapId}"]`);
    if (tr && updated) tr.outerHTML = _patronMapRow(updated);
  } catch(e) {
    toast(e.message || 'Update failed', 'error');
  }
}

function _splitPreviewUpdate() {
  const sample = document.getElementById('pm-split-sample')?.value || '';
  const delim = document.getElementById('pm-split-delim')?.value || ' ';
  const el = document.getElementById('pm-split-preview');
  if (!el) return;
  if (!sample) { el.innerHTML = ''; return; }
  const parts = sample.split(delim).map(p => p.trim()).filter(Boolean);
  el.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap">${parts.map((p, i) =>
    `<span class="badge badge-dim mono" style="font-size:11px">Part ${i + 1}: <strong>${esc(p)}</strong></span>`
  ).join('')}</div>`;
  // Ensure enough part selects exist
  const selects = document.querySelectorAll('.pm-split-header');
  while (selects.length < parts.length) _splitAddPart();
}

function _splitAddPart() {
  const container = document.getElementById('pm-split-parts');
  if (!container) return;
  const count = container.querySelectorAll('.pm-split-header').length;
  const div = document.createElement('div');
  div.className = 'form-group';
  div.style.cssText = 'display:flex;gap:8px;align-items:center';
  div.innerHTML = `
    <span class="text-dim" style="font-size:11px;min-width:52px">Part ${count + 1} →</span>
    <select class="form-select pm-split-header" style="font-size:12px;font-family:var(--font-mono,monospace);flex:1">${_kohaHeaderOptions('')}</select>`;
  container.appendChild(div);
}

async function submitSplitColumn(mapId, sourceColumn) {
  const p = state.currentProject;
  const delim = document.getElementById('pm-split-delim')?.value || ' ';
  const headerSelects = document.querySelectorAll('.pm-split-header');
  const parts = [];
  headerSelects.forEach((sel, i) => {
    if (sel.value) parts.push({ index: i, header: sel.value });
  });
  if (!parts.length) { toast('Select at least one Koha header', 'error'); return; }

  try {
    // Update the existing mapping to be the first part
    await window.api('PATCH', `/projects/${p.id}/patrons/maps/${mapId}`, {
      target_header: parts[0].header,
      transform_type: 'split',
      transform_config: { delimiter: delim, index: parts[0].index },
      ignored: false,
    });

    // Create additional mappings for remaining parts
    for (let i = 1; i < parts.length; i++) {
      await window.api('POST', `/projects/${p.id}/patrons/maps`, {
        source_column: sourceColumn,
        target_header: parts[i].header,
        transform_type: 'split',
        transform_config: { delimiter: delim, index: parts[i].index },
        ignored: false,
        is_controlled_list: PATRON_CONTROLLED_HEADERS.includes(parts[i].header),
      });
    }

    closeModal();
    toast(`Split into ${parts.length} fields`, 'success');
    renderPatronMapping();
  } catch(e) {
    toast(e.message || 'Split failed', 'error');
  }
}

function _addMapTransformChanged() {
  const sel = document.getElementById('pm-add-transform')?.value || 'copy';

  const { transform_type } = _decodeTransform(sel);
  if (transform_type === 'regex') {
    area.innerHTML = `
      <div class="form-group">
        <label class="form-label">Regex pattern</label>
        <input class="form-input mono" id="pm-add-cfg-pattern" placeholder="e.g. ^(\\d{3})-(\\d{4})$" style="font-size:12px">
      </div>

        <input class="form-input mono" id="pm-add-cfg-replacement" placeholder="e.g. $1$2" style="font-size:12px">
      </div>`;
  } else if (transform_type === 'const') {
    area.innerHTML = `
      <div class="form-group">
        <label class="form-label">Constant value</label>
        <input class="form-input mono" id="pm-add-cfg-value" placeholder="e.g. MAIN" style="font-size:12px">

async function submitPatronMap() {
  const p = state.currentProject;
  const source = (document.getElementById('pm-add-source')?.value || '').trim();
  if (!source) { toast('Source column is required', 'error'); return; }
  const targetHeader = document.getElementById('pm-add-header')?.value || null;
  const rawTransform = document.getElementById('pm-add-transform')?.value || 'copy';
  let { transform_type, transform_config } = _decodeTransform(rawTransform);
  // Pick up config from the extra fields if present
  if (transform_type === 'regex') {
    transform_config = {
      pattern: document.getElementById('pm-add-cfg-pattern')?.value || '',
      replacement: document.getElementById('pm-add-cfg-replacement')?.value || '',
    };
  } else if (transform_type === 'const') {
    transform_config = { value: document.getElementById('pm-add-cfg-value')?.value || '' };
  }
  const isControlled = document.getElementById('pm-add-ctrl')?.checked || false;
  try {
    await window.api('POST', `/projects/${p.id}/patrons/maps`, {
      source_column: source,
      target_header: targetHeader || null,
      ignored: !targetHeader,
      transform_type,
      transform_config,
      is_controlled_list: isControlled,
    });
    closeModal();
    toast('Mapping added', 'success');
    renderPatronMapping();
  } catch(e) {
    toast(e.message || 'Failed to add mapping', 'error');
  }
}

async function renderPatronValues() {
  const p = state.currentProject;
  const wrap = document.getElementById('patron-tab');
  if (!wrap) return;
  wrap.innerHTML = '<div class="spinner"></div>';

  const categories = ['categorycode', 'branchcode', 'title', 'lost'];

  // Load maps to check readiness
  const maps = await window.api('GET', `/projects/${p.id}/patrons/maps`) || [];
  const approvedControlled = maps.filter(m => m.approved && m.is_controlled_list && m.target_header);
  const controlledNotApproved = maps.filter(m => m.is_controlled_list && !m.approved && m.target_header);
  const mappedToControlled = maps.filter(m => PATRON_CONTROLLED_HEADERS.includes(m.target_header) && !m.is_controlled_list);

  let prereqHtml = '';
  if (approvedControlled.length === 0) {
    const tips = [];
    if (maps.length === 0) {
      tips.push('No column maps exist yet. Go to the <strong>Column Mapping</strong> tab first to map your source columns to Koha headers.');
    } else if (mappedToControlled.length > 0) {
      tips.push(`${mappedToControlled.length} column(s) are mapped to controlled headers (${mappedToControlled.map(m=>m.target_header).join(', ')}) but the <strong>Controlled</strong> checkbox is not ticked. Go to Column Mapping and tick the checkbox.`);
    }
    if (controlledNotApproved.length > 0) {
      tips.push(`${controlledNotApproved.length} controlled column(s) are not yet <strong>approved</strong>. Click the status badge in Column Mapping to approve them.`);
    }
    if (tips.length === 0 && maps.length > 0) {
      tips.push('No columns are mapped to controlled-list Koha headers (<code>categorycode</code>, <code>branchcode</code>, <code>title</code>, <code>lost</code>). Map at least one source column to a controlled header in Column Mapping, tick the Controlled checkbox, and approve it.');
    }
    prereqHtml = `
      <div style="background:var(--amber-bg,#fff8e1);border:1px solid var(--amber-border,#ffe082);border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:13px">
        <strong>Scan requires approved controlled-list column maps</strong>
        <ul style="margin:6px 0 0 16px;padding:0">${tips.map(t => `<li style="margin-bottom:4px">${t}</li>`).join('')}</ul>
      </div>`;
  } else {
    prereqHtml = `
      <div style="font-size:12px;margin-bottom:12px;color:var(--text-dim)">
        Ready to scan <strong>${approvedControlled.length}</strong> controlled column(s): ${approvedControlled.map(m => `<code>${esc(m.target_header)}</code>`).join(', ')}
      </div>`;
  }

  wrap.innerHTML = `
    ${prereqHtml}
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
      <button class="btn btn-primary" onclick="runPatronScan()" ${approvedControlled.length === 0 ? 'disabled title="No approved controlled maps"' : ''}>Scan Controlled Values</button>
      <div id="patron-scan-status" style="margin-left:8px"></div>
    </div>
    <div id="patron-values-panels"></div>
    <div style="margin-top:16px">
      <div class="card">
        <div class="card-header"><span class="card-title">Value Rules</span></div>
        <div id="patron-rules-list"><div class="spinner"></div></div>
      </div>
    </div>`;

  // Load scan values per category
  const panels = document.getElementById('patron-values-panels');
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  for (const cat of categories) {
    const hasMap = approvedControlled.some(m => m.target_header === cat);
    try {
      const vals = await window.api('GET', `/projects/${p.id}/patrons/values?header=${cat}`);
      html += `
        <div class="card">
          <div class="card-header"><span class="card-title">${esc(cat)}</span><span class="badge badge-dim">${vals?.length || 0} values</span></div>
          ${vals && vals.length ? `
          <div style="max-height:250px;overflow:auto;border:1px solid var(--border);border-radius:4px;margin-top:8px">
            <table class="data-table" style="font-size:11px;width:100%">
              <thead><tr><th>Value</th><th style="text-align:right">Records</th></tr></thead>
              <tbody>${vals.slice(0, 50).map(v => `<tr>
                <td class="mono">${esc(v.source_value)}</td>
                <td style="text-align:right">${v.record_count.toLocaleString()}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
          ${vals.length > 50 ? `<div class="text-dim" style="font-size:10px;margin-top:4px">Showing 50 of ${vals.length}</div>` : ''}
          ` : `<div class="text-dim" style="font-size:12px;margin-top:8px">${hasMap ? 'No values scanned yet. Click Scan above.' : 'No approved controlled map for this header.'}</div>`}
        </div>`;
    } catch(e) {
      html += `<div class="card"><div class="card-header"><span class="card-title">${esc(cat)}</span></div><div class="text-dim">Error loading</div></div>`;
    }
  }
  html += '</div>';
  panels.innerHTML = html;

  // Load rules
  try {
    const rules = await window.api('GET', `/projects/${p.id}/patrons/rules`);
    const rulesEl = document.getElementById('patron-rules-list');
    if (!rules || !rules.length) {
      rulesEl.innerHTML = '<div class="text-dim" style="font-size:12px">No value rules defined yet.</div>';
    } else {
      rulesEl.innerHTML = `
        <table class="data-table" style="font-size:12px;width:100%">
          <thead><tr><th>Header</th><th>Operation</th><th>Source</th><th>Target</th><th></th></tr></thead>
          <tbody>${rules.map(r => `<tr>
            <td class="mono">${esc(r.koha_header)}</td>
            <td><span class="badge ${r.operation==='rename'?'badge-dim':r.operation==='delete'?'badge-red':'badge-amber'}">${esc(r.operation)}</span></td>
            <td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc((r.source_values||[]).join(', '))}</td>
            <td class="mono">${esc(r.target_value || '—')}</td>
            <td style="text-align:right"><button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="deletePatronRule('${r.id}')">Del</button></td>
          </tr>`).join('')}</tbody>
        </table>`;
    }
  } catch(e) { console.error(e); }
}

let _s7KohaRefs = null;

  }

function s7RenderSetupGrid() {
  const grid = document.getElementById('s7-setup-grid');
  if (!grid) return;

  const categories = [
    { key: 'libraries', label: 'Libraries (branches)', kohaKey: 'libraries', kohaIdField: 'library_id', kohaNameField: 'name', canPush: true },
    { key: 'patron_categories', label: 'Patron Categories', kohaKey: 'patron_categories', kohaIdField: 'patron_category_id', kohaNameField: 'name', canPush: false },
    { key: 'item_types', label: 'Item Types', kohaKey: 'item_types', kohaIdField: 'item_type_id', kohaNameField: 'description', canPush: false },
    { key: 'locations', label: 'Locations (LOC)', kohaKey: null, avKey: 'LOC', canPush: false },
    { key: 'ccodes', label: 'Collection Codes (CCODE)', kohaKey: null, avKey: 'CCODE', canPush: false },
  ];

  let html = '';
  for (const cat of categories) {
    const needed = _s7NeededRefs ? (_s7NeededRefs[cat.key] || []) : [];
    if (!needed.length && !_s7KohaRefs) continue;

    // Build set of existing Koha values
    let kohaValues = new Set();
    if (_s7KohaRefs) {
      if (cat.kohaKey && _s7KohaRefs[cat.kohaKey]) {
        _s7KohaRefs[cat.kohaKey].forEach(item => {
          kohaValues.add(item[cat.kohaIdField] || item.value || '');
        });
      } else if (cat.avKey && _s7KohaRefs.authorised_values && _s7KohaRefs.authorised_values[cat.avKey]) {
        _s7KohaRefs.authorised_values[cat.avKey].forEach(item => {
          kohaValues.add(item.value || item.authorised_value || '');
        });
      }
    }

    const missingItems = needed.filter(n => !kohaValues.has(n.value));
    const existCount = needed.length - missingItems.length;

    html += '<div class="card" style="margin-bottom:16px">'
      + '<div class="card-header" style="display:flex;justify-content:space-between;align-items:center">'
      + '<span class="card-title">' + esc(cat.label) + '</span>'
      + '<span style="font-size:11px;color:var(--text-dim)">'
      + needed.length + ' needed' + (_s7KohaRefs ? ' &middot; ' + existCount + ' exist &middot; ' + missingItems.length + ' missing' : '')
      + '</span></div>';

    if (!needed.length) {
      html += '<p class="text-dim" style="font-size:12px;padding:8px 0">No values found in project data. Run Stage 5/6 scans first.</p>';
    } else {
      html += '<table class="data-table" style="font-size:12px;width:100%">'
        + '<thead><tr><th>Value</th><th>Records</th>' + (_s7KohaRefs ? '<th>Status</th>' : '') + '</tr></thead><tbody>';
      for (const n of needed) {
        const exists = kohaValues.has(n.value);
        const statusBadge = _s7KohaRefs
          ? (exists
            ? '<span class="badge badge-green">exists</span>'
            : '<span class="badge badge-red">MISSING</span>')
          : '';
        html += '<tr><td class="mono">' + esc(n.value) + '</td>'
          + '<td class="mono">' + n.record_count.toLocaleString() + '</td>'
          + (_s7KohaRefs ? '<td>' + statusBadge + '</td>' : '')
          + '</tr>';
      }
      html += '</tbody></table>';
    }

    // Action buttons
    if (cat.canPush && missingItems.length > 0 && _s7KohaRefs) {
      html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
        + '<button class="btn btn-primary btn-sm" onclick="s7PushMissingLibraries()">Push ' + missingItems.length + ' Missing Libraries</button>'
        + '<div id="s7-push-libs-status" style="margin-top:8px"></div></div>';
    } else if (!cat.canPush && missingItems.length > 0 && _s7KohaRefs) {
      html += '<div style="margin-top:8px;padding:8px;background:var(--surface-dim);border-radius:4px;font-size:11px;color:var(--text-secondary)">'
        + 'These must be created manually in Koha Staff UI &rarr; Administration &rarr; ' + esc(cat.label) + '</div>';
    }

    html += '</div>';
  }

  // Show Koha existing data if fetched but no project needs
  if (_s7KohaRefs && !_s7NeededRefs) {
    html += '<p class="text-dim" style="font-size:12px">Koha data loaded. Click "Scan Project Data" to compare.</p>';
  }

  grid.innerHTML = html || '<p class="text-dim" style="font-size:12px">No reference data to display. Run scans in Stages 5-6 first, then fetch from Koha.</p>';
}

async function s7PushMissingLibraries() {
  const p = state.currentProject;
  const statusEl = document.getElementById('s7-push-libs-status');
  if (!_s7NeededRefs || !_s7KohaRefs) return;

  // Build set of existing
  const existing = new Set();
  (_s7KohaRefs.libraries || []).forEach(l => existing.add(l.library_id || ''));

  const missing = (_s7NeededRefs.libraries || [])
    .filter(n => !existing.has(n.value))
    .map(n => ({ library_id: n.value, name: n.value }));

  if (!missing.length) {
    statusEl.innerHTML = '<span class="text-green" style="font-size:12px">All libraries already exist.</span>';
    return;
  }

  statusEl.innerHTML = '<div class="spinner"></div> Pushing ' + missing.length + ' libraries…';
  try {
    const r = await window.api('POST', '/projects/' + p.id + '/push/libraries', { libraries: missing });
    statusEl.innerHTML = '<span class="text-green" style="font-size:12px">' + r.success_count + ' created, ' + r.failed_count + ' failed.</span>';
    if (r.success_count > 0) {
      // Refresh Koha data
      await s7FetchKohaRefs();
    }
  } catch (e) {
    statusEl.innerHTML = '<span class="text-red" style="font-size:12px">Failed: ' + e.message + '</span>';
  }
}

function _fmtBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

async function s7LoadFiles() {
  const p = state.currentProject;
  const el = document.getElementById('s7-files');
  if (!el) return;
  try {
    const r = await window.api('GET', `/projects/${p.id}/push/files`);

      el.innerHTML = '<span class="text-dim" style="font-size:12px">No push-ready files found. Complete Transform/Merge first.</span>';
      return;
    }
    const marcFiles = r.files.filter(f => f.type === 'marc');

    let html = '';
    if (marcFiles.length) {
      html += `<div style="margin-bottom:6px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">MARC File</div>

          <tbody>${marcFiles.map(f => `<tr>
            <td class="mono">${esc(f.filename)}</td>

            <td>${_fmtBytes(f.size)}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="s7PreviewFile('${esc(f.filename)}', ${f.record_count || 0})">Preview</button>
              <a class="btn btn-ghost btn-sm" style="font-size:10px" href="/api/v1/projects/${esc(p.id)}/push/files/download?filename=${encodeURIComponent(f.filename)}" download="${esc(f.filename)}">Download</a>
            </td>
          </tr>`).join('')}</tbody></table>`;
    }
    if (cvFiles.length) {
      html += `<div style="margin-bottom:6px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">Controlled Value Lists</div>
        <table class="data-table" style="font-size:12px;width:100%">
          <thead><tr><th>File</th><th>Category</th><th>Size</th><th></th></tr></thead>
          <tbody>${cvFiles.map(f => `<tr>
            <td class="mono">${esc(f.filename)}</td>
            <td><span class="badge badge-dim">${esc(f.source)}</span></td>
            <td>${_fmtBytes(f.size)}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="s7PreviewCSV('${esc(f.filename)}', '${esc(f.source)}')">Preview</button>
              <a class="btn btn-ghost btn-sm" style="font-size:10px" href="/api/v1/projects/${esc(p.id)}/push/files/download?filename=${encodeURIComponent(f.filename)}" download="${esc(f.filename)}">Download</a>
            </td>
          </tr>`).join('')}</tbody></table>`;
    }
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<span class="text-dim" style="font-size:12px">Failed to load files.</span>';
    console.error(e);
  }
}

window._s7PreviewFile = null;
window._s7PreviewIdx = 0;
window._s7PreviewTotal = 0;

function s7PreviewFile(filename, totalRecords) {
  window._s7PreviewFile = filename;
  window._s7PreviewIdx = 0;

  const card = document.getElementById('s7-preview-card');
  if (card) card.style.display = '';

function s7PreviewNav(dir) {
  const next = window._s7PreviewIdx + dir;
  if (next < 0 || next >= window._s7PreviewTotal) return;
  window._s7PreviewIdx = next;
  s7LoadPreview(next);
}

async function s7LoadPreview(idx) {
  const p = state.currentProject;
  const el = document.getElementById('s7-preview');
  const idxEl = document.getElementById('s7-preview-index');
  if (!el) return;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await window.api('GET', `/projects/${p.id}/push/files/preview?filename=${encodeURIComponent(window._s7PreviewFile)}&record_index=${idx}`);
    if (!r || !r.record) { el.innerHTML = '<span class="text-dim">Could not load record.</span>'; return; }
    window._s7PreviewTotal = r.total_records;
    if (idxEl) idxEl.textContent = `${idx + 1} / ${r.total_records}`;
    const rec = r.record;
    el.innerHTML = `
      <div style="margin-bottom:6px;font-size:12px;color:var(--text-secondary)">
        <span class="mono">${esc(window._s7PreviewFile)}</span> — Title: <strong>${esc(rec.title || '—')}</strong>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:12px;max-height:450px;overflow:auto;font-size:12px;font-family:var(--mono)">
        ${rec.fields.map(f => {
          if (f.data !== undefined) {
            return `<div><span style="color:var(--cerulean)">${esc(f.tag)}</span> ${esc(f.data)}</div>`;
          }
          const subs = f.subfields.map(s => `<span style="color:var(--amber)">$${esc(s.code)}</span>${esc(s.value)}`).join(' ');
          return `<div><span style="color:var(--cerulean)">${esc(f.tag)}</span> ${esc(f.ind1||' ')}${esc(f.ind2||' ')} ${subs}</div>`;
        }).join('')}
      </div>`;
  } catch (e) {
    el.innerHTML = '<span class="text-dim">Preview not available.</span>';
  }
  const card = document.getElementById('s7-preview-card');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

          <span class="badge badge-amber">Provisioning</span>
          <span class="text-dim mono">${esc(step)}</span>
        </div>`;
      setTimeout(loadSandboxStatus, 3000);
    } else if (status.state === 'SUCCESS') {
      const r = status.result || {};
      if (r.status === 'running') {
        wrap.innerHTML = `
          <div style="margin-bottom:12px">
            <span class="badge badge-green">Running</span>
            <span class="mono text-secondary" style="margin-left:8px">${esc(r.container_name || '')}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-secondary)">
            <div>Container: <span class="mono">${esc(r.container_id || '—')}</span></div>
            <div>URL: <a href="${esc(r.koha_url || '#')}" target="_blank" class="text-cerulean">${esc(r.koha_url || '—')}</a></div>
            <div>Port: <span class="mono">${r.port || '—'}</span></div>
          </div>
          <button class="btn btn-danger" style="margin-top:16px" onclick="teardownSandbox()">■ Teardown</button>`;
      } else {
        wrap.innerHTML = `
          <div class="alert alert-error">${esc(r.error || 'Sandbox failed to start')}</div>
          <button class="btn btn-primary" style="margin-top:12px" onclick="provisionSandbox()">▶ Retry Provision</button>`;
      }
    } else if (status.state === 'FAILURE') {
      wrap.innerHTML = `
        <div class="alert alert-error">${esc(status.error || 'Provision failed')}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="provisionSandbox()">▶ Retry Provision</button>`;
    } else {
      // stopped or other
      wrap.innerHTML = `
        <p class="text-secondary" style="font-size:12px;margin-bottom:16px">No active sandbox.</p>
        <div class="form-group">
          <label class="form-label">Koha Version (optional)</label>
          <input class="form-input" id="sandbox-version" placeholder="master (default)">
        </div>
        <button class="btn btn-primary" onclick="provisionSandbox()">▶ Provision Sandbox</button>`;
    }
  } catch (e) {
    wrap.innerHTML = `
      <p class="text-secondary" style="font-size:12px;margin-bottom:16px">No active sandbox.</p>
      <div class="form-group">
        <label class="form-label">Koha Version (optional)</label>
        <input class="form-input" id="sandbox-version" placeholder="master (default)">
      </div>
      <button class="btn btn-primary" onclick="provisionSandbox()">▶ Provision Sandbox</button>`;
  }
}

async function loadSandboxInstances() {
  const p = state.currentProject;
  const wrap = document.getElementById('sandbox-instances');
  if (!wrap) return;
  try {
    const instances = await window.api('GET', `/projects/${p.id}/sandbox/instances`);
    if (!instances || !instances.length) {
      wrap.innerHTML = `<div class="text-dim" style="font-size:12px">No instances yet.</div>`;
      return;
    }
    wrap.innerHTML = `
      <table class="data-table">
        <thead><tr><th>Container</th><th>Status</th><th>Port</th><th>Created</th></tr></thead>
        <tbody>
          ${instances.map(i => `<tr>
            <td class="mono" style="font-size:11px">${esc(i.container_name || i.container_id?.slice(0,12) || '—')}</td>
            <td><span class="badge ${i.status==='running'?'badge-green':i.status==='stopped'?'badge-dim':i.status==='error'?'badge-red':'badge-amber'}">${esc(i.status)}</span></td>
            <td class="mono">${i.exposed_port || '—'}</td>
            <td class="text-dim" style="font-size:11px">${new Date(i.created_at).toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) { console.error(e); }
}

async function provisionSandbox() {
  const p = state.currentProject;
  const version = document.getElementById('sandbox-version')?.value?.trim() || null;
  try {
    const r = await window.api('POST', `/projects/${p.id}/sandbox/provision`, version ? { koha_version: version } : {});
    if (!r) return;
    toast('Sandbox provisioning started', 'info');
    setTimeout(loadSandboxStatus, 2000);
  } catch (e) { console.error(e); }
}

async function teardownSandbox() {
  const p = state.currentProject;
  try {
    const r = await window.api('POST', `/projects/${p.id}/sandbox/teardown`);
    if (!r) return;
    toast('Sandbox teardown started', 'info');
    setTimeout(() => {
      loadSandboxStatus();
      loadSandboxInstances();
    }, 3000);
  } catch (e) { console.error(e); }
}

// ══════════════════════════════════════════════════════════════════
// Progress bar helper
// ══════════════════════════════════════════════════════════════════
function renderProgressBar(opts = {}) {
  const { percent, label, status, detail } = opts;
  const pct = percent != null ? Math.min(100, Math.max(0, percent)) : null;
  const fillClass = status === 'complete' ? 'complete' : status === 'error' ? 'error' : status === 'paused' ? 'paused' : (pct == null ? 'indeterminate' : '');
  const fillWidth = pct != null ? pct : 100;
  const labelText = label || (pct != null ? `${Math.round(pct)}%` : 'Processing…');
  return `
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill ${fillClass}" style="width:${fillWidth}%"></div>
      <div class="progress-bar-text">${esc(labelText)}</div>
    </div>
    ${detail ? `<div style="font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:2px">${esc(detail)}</div>` : ''}`;
}

// ══════════════════════════════════════════════════════════════════
// Global background task tracker — expandable multi-task panel
// ══════════════════════════════════════════════════════════════════
window._bgTasks = {}; // { key: { projectId, taskId, label, stageType, onComplete, status, _cancel, _lastProgress } }

function toggleTaskPanel() {
  const bar = document.getElementById('global-task-bar');
  if (bar) bar.classList.toggle('expanded');
}

function _renderTaskPanel() {
  const bar = document.getElementById('global-task-bar');
  if (!bar) return;
  const keys = Object.keys(window._bgTasks);

  if (keys.length === 0) {
    bar.classList.remove('visible', 'expanded');
    return;
  }
  bar.classList.add('visible');

  // Badge count
  document.getElementById('gtb-badge').textContent = keys.length;

  // Collapsed bar: show most recent task summary
  const lastKey = keys[keys.length - 1];
  const lastTask = window._bgTasks[lastKey];
  const lp = lastTask._lastProgress || {};
  document.getElementById('gtb-label').textContent = lastTask.label;
  document.getElementById('gtb-progress').innerHTML =
    `<div class="progress-bar-wrap" style="height:16px"><div class="progress-bar-fill ${lp.statusType || (lp.pct == null ? 'indeterminate' : '')}" style="width:${lp.pct != null ? lp.pct : 100}%"></div></div>`;
  document.getElementById('gtb-detail').textContent = lp.detail || '';

  // Expanded panel: all tasks
  const expanded = document.getElementById('gtb-expanded');
  expanded.innerHTML = keys.map(key => {
    const t = window._bgTasks[key];
    const p = t._lastProgress || {};
    const isPaused = t.status === 'paused';
    const isRunning = t.status === 'running';
    let actions = '';
    if (isRunning) {
      actions = `<button onclick="event.stopPropagation(); pauseTask('${key}')">Pause</button>` +
                `<button class="btn-cancel" onclick="event.stopPropagation(); cancelTask('${key}')">Cancel</button>`;
    } else if (isPaused) {
      actions = `<button onclick="event.stopPropagation(); resumeTask('${key}')">Resume</button>` +
                `<button class="btn-cancel" onclick="event.stopPropagation(); cancelTask('${key}')">Cancel</button>`;
    }
    return `<div class="gtb-task-row">
      <span class="gtb-task-label">${esc(t.label)}</span>
      <div class="gtb-task-bar">
        <div class="progress-bar-wrap" style="height:14px"><div class="progress-bar-fill ${p.statusType || (p.pct == null ? 'indeterminate' : '')}" style="width:${p.pct != null ? p.pct : 100}%"></div></div>
      </div>
      <span class="gtb-task-detail">${esc(p.detail || '')}</span>
      <div class="gtb-task-actions">${actions}</div>
    </div>`;
  }).join('');
}

async function pauseTask(taskKey) {
  const t = window._bgTasks[taskKey];
  if (!t) return;
  try {
    await window.api('POST', `/projects/${t.projectId}/tasks/${t.taskId}/pause`);
    t.status = 'paused';
    _renderTaskPanel();
  } catch (e) { console.warn('pause error:', e); }
}

async function resumeTask(taskKey) {
  const t = window._bgTasks[taskKey];
  if (!t) return;
  try {
    await window.api('POST', `/projects/${t.projectId}/tasks/${t.taskId}/resume`);
    t.status = 'running';
    _renderTaskPanel();
  } catch (e) { console.warn('resume error:', e); }
}

async function cancelTask(taskKey) {
  const t = window._bgTasks[taskKey];
  if (!t) return;
  if (!confirm(`Cancel "${t.label}"? This will terminate the task.`)) return;
  try {
    await window.api('POST', `/projects/${t.projectId}/tasks/${t.taskId}/cancel`);
    if (t._cancel) t._cancel();
    delete window._bgTasks[taskKey];
    toast(`${t.label} cancelled`, 'info');
    _renderTaskPanel();
    try { if (t.onComplete) t.onComplete(); } catch(e) { console.warn('onComplete error:', e); }
  } catch (e) { console.warn('cancel error:', e); }
}

async function restoreActiveTasks(projectId) {
  try {
    const tasks = await window.api('GET', `/projects/${projectId}/tasks/active`);
    if (!tasks || !tasks.length) return;
    const _TASK_LABELS = {
      transform: 'Transform', merge: 'Merge',
      preflight: 'Preflight', bulkmarc: 'Push Bibs',
      patrons: 'Push Patrons', holds: 'Push Holds',
      circ: 'Push Circ', reindex: 'Reindex',
    };
    for (const t of tasks) {
      if (!t.task_id) continue;
      // Build a stageType from task_type
      let stageType = t.task_type;
      if (['preflight','bulkmarc','patrons','holds','circ','reindex'].includes(t.task_type)) stageType = 'push';
      const taskKey = `${stageType}-${projectId}`;
      if (window._bgTasks[taskKey]) continue; // already tracking
      const label = _TASK_LABELS[t.task_type] || t.task_type;
      pollTaskStatus(projectId, t.task_id, null, label, stageType, null);
    }
  } catch (e) { console.warn('restoreActiveTasks error:', e); }
}

function _parseProgress(r, label) {
  const s = r.state || r.status;
  const prog = r.progress || {};
  const res = r.result || {};
  let pct = null, detail = '', statusType = null, barLabel = `${label}…`;

  if (s === 'SUCCESS') {
    pct = 100; statusType = 'complete';
    barLabel = `${label} complete`;
    detail = [
      res.files_processed ? `${res.files_processed} files` : '',
      res.total_records ? `${res.total_records.toLocaleString()} records` : '',
      res.records_skipped ? `${res.records_skipped} skipped` : '',
    ].filter(Boolean).join(' · ') || 'Done';
  } else if (s === 'FAILURE') {
    pct = 100; statusType = 'error';
    barLabel = `${label} failed`;
    detail = r.error || 'Unknown error';
  } else if (s === 'PAUSED') {
    statusType = 'paused';
    barLabel = `${label} paused`;
    detail = prog.records_done ? `${prog.records_done.toLocaleString()} records` : '';
  } else {
    if (prog.records_done != null) {
      detail = `${prog.records_done.toLocaleString()} records`;
      if (prog.files_done != null && prog.files_total) {
        detail += ` · file ${prog.files_done + 1}/${prog.files_total}`;
        pct = (prog.files_done / prog.files_total) * 100;
      }
      if (prog.current_file) detail += ` · ${prog.current_file}`;
    } else if (prog.records_scanned != null) {
      detail = `${prog.records_scanned.toLocaleString()} scanned`;
    } else if (prog.records_processed != null) {
      detail = `${prog.records_processed.toLocaleString()} processed`;
    } else if (prog.records_written != null) {
      detail = `${prog.records_written.toLocaleString()} written`;
    } else if (prog.step) {
      detail = prog.step;
    }
  }
  return { pct, detail, statusType, barLabel, state: s };
}

// ══════════════════════════════════════════════════════════════════
// Generic task poller (stage-aware status endpoints)
// ══════════════════════════════════════════════════════════════════
function pollTaskStatus(projectId, taskId, statusElId, label, stageType, onComplete) {
  const taskKey = `${stageType}-${projectId}`;

  // Cancel any existing poll for the same task key
  if (window._bgTasks[taskKey]?._cancel) window._bgTasks[taskKey]._cancel();

  let cancelled = false;
  // Register as background task
  window._bgTasks[taskKey] = {
    projectId, taskId, label, stageType, onComplete, status: 'running',
    _cancel: () => { cancelled = true; },
    _lastProgress: {},
  };
  _renderTaskPanel();

  const statusEndpoints = {
    transform:       `/projects/${projectId}/transform/status?task_id=${taskId}`,
    dedup:           `/projects/${projectId}/dedup/status?task_id=${taskId}`,
    'reconcile-scan':  `/projects/${projectId}/reconcile/scan/status`,
    'reconcile-apply': `/projects/${projectId}/reconcile/apply/status`,
    'patron-scan':   `/projects/${projectId}/patrons/scan/status`,
    'patron-apply':  `/projects/${projectId}/patrons/apply/status`,
    'patron-ai':     `/projects/${projectId}/patrons/maps/ai-suggest/status`,
    push:            `/projects/${projectId}/push/status?task_id=${taskId}`,
    sandbox:         `/projects/${projectId}/sandbox/status`,
  };
  const statusUrl = statusEndpoints[stageType] || statusEndpoints.transform;

  const poll = async () => {
    if (cancelled) return;
    let finished = false;
    try {
      const r = await window.api('GET', statusUrl);
      if (!r || cancelled) return;
      const p = _parseProgress(r, label);

      // Store latest progress for panel rendering
      if (window._bgTasks[taskKey]) {
        window._bgTasks[taskKey]._lastProgress = p;
        // Sync paused state from backend
        if (p.state === 'PAUSED') window._bgTasks[taskKey].status = 'paused';
        else if (p.state === 'PROGRESS' || p.state === 'STARTED') window._bgTasks[taskKey].status = 'running';
      }

      // Update inline element if it still exists on page
      if (statusElId) {
        const el = document.getElementById(statusElId);
        if (el) {
          el.innerHTML = renderProgressBar({ percent: p.pct, label: p.barLabel, status: p.statusType, detail: p.detail });
        }
      }

      // Always update the panel
      _renderTaskPanel();

      if (p.state === 'SUCCESS') {
        finished = true;
        toast(`${label} complete`, 'success');
        delete window._bgTasks[taskKey];
        _renderTaskPanel();
        try { if (onComplete) onComplete(); } catch(e) { console.warn('onComplete error:', e); }
      } else if (p.state === 'FAILURE') {
        finished = true;
        toast(`${label} failed`, 'error');
        delete window._bgTasks[taskKey];
        _renderTaskPanel();
        try { if (onComplete) onComplete(); } catch(e) { console.warn('onComplete error:', e); }
      }
    } catch (e) { console.warn('poll error:', e); }
    if (!finished && !cancelled) setTimeout(poll, 2000);
  };
  poll();
}

// ══════════════════════════════════════════════════════════════════
// Override navigate — add stage7 + sandbox breadcrumb
// ══════════════════════════════════════════════════════════════════
window.navigate = function(view, params = {}) {
  state.currentView = view;
  Object.assign(state, params);

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  const hasProject = !!state.currentProject;
  document.getElementById('project-nav-label').style.display = hasProject ? '' : 'none';
  document.getElementById('project-nav').style.display = hasProject ? '' : 'none';

  const viewEl = document.getElementById('view');
  const renders = {
    dashboard:     renderDashboard,
    'new-project': renderNewProject,
    stage1:        renderStage1,
    stage2:        renderStage2,
    stage3:        window.renderStage3,
    stage4:        window.renderStage4,
    stage5:        window.renderStage5,
    stage6:        window.renderStage6,
    stage7:        window.renderStage7,
    stage8:        window.renderStage8,
    'project-log': renderProjectLog,
    'project-settings': renderProjectSettings,
    templates:     renderTemplates,
    suggestions:   renderSuggestions,
  };
  const renderer = renders[view];
  if (renderer) renderer(viewEl);
  updateBreadcrumb(view);

  // Restore active tasks for the current project on any navigation
  if (state.currentProject && state.currentProject.id) {
    restoreActiveTasks(state.currentProject.id);
  }
};

// ── Init ─────────────────────────────────────────────────────────────
navigate('dashboard');
checkHealth();
setInterval(checkHealth, 30000);
