<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerulean Next</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════
       CERULEAN NEXT — DESIGN SYSTEM (LOCKED)
       ═══════════════════════════════════════════════════════════ */
    :root {
      --cerulean:       #00BCD4;
      --teal:           #26C6DA;
      --cerulean-dim:   rgba(0,188,212,0.08);
      --cerulean-glow:  rgba(0,188,212,0.18);

      --bg-void:        #080C10;
      --bg-deep:        #0D1117;
      --bg-panel:       #111820;
      --bg-card:        #151E28;
      --bg-hover:       #1A2535;
      --bg-active:      #1E2D3D;

      --border:         rgba(0,188,212,0.13);
      --border-mid:     rgba(0,188,212,0.22);
      --border-strong:  rgba(0,188,212,0.38);

      --text-primary:   #E8EDF2;
      --text-secondary: #8899AA;
      --text-dim:       #4A5A6A;

      --green:          #4CAF82;
      --green-dim:      rgba(76,175,130,0.12);
      --amber:          #F5A623;
      --amber-dim:      rgba(245,166,35,0.12);
      --red:            #E05252;
      --red-dim:        rgba(224,82,82,0.12);
      --purple:         #7C4DFF;
      --purple-dim:     rgba(124,77,255,0.12);

      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
      --radius:  4px;
      --radius-lg: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cerulean); }

    /* ── typography ── */
    .mono { font-family: var(--mono); }
    .text-cerulean { color: var(--cerulean); }
    .text-secondary { color: var(--text-secondary); }
    .text-dim { color: var(--text-dim); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }
    .text-red { color: var(--red); }
    .text-purple { color: var(--purple); }

    /* ═══════════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════════ */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-deep);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-logo .wordmark {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--cerulean);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-logo .subtitle {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--mono);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .nav-section-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      user-select: none;
    }

    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      color: var(--cerulean);
      border-left-color: var(--cerulean);
      background: var(--cerulean-dim);
    }

    .nav-item .nav-icon {
      font-size: 14px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .stage-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      background: var(--bg-card);
      color: var(--text-dim);
    }

    .nav-item.stage-complete .stage-badge {
      background: var(--green-dim);
      color: var(--green);
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.err { background: var(--red); }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-void);
    }

    /* ── Topbar ── */
    #topbar {
      height: 48px;
      flex-shrink: 0;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    .topbar-breadcrumb {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
      flex: 1;
    }

    .topbar-breadcrumb .crumb-sep { color: var(--text-dim); margin: 0 6px; }
    .topbar-breadcrumb .crumb-active { color: var(--text-primary); }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    /* ── View container ── */
    #view {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px;
    }

    /* ═══════════════════════════════════════════════════════════
       COMPONENTS
       ═══════════════════════════════════════════════════════════ */

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-weight: 500;
    }

    .btn-primary {
      background: var(--cerulean);
      color: var(--bg-void);
    }
    .btn-primary:hover { background: var(--teal); box-shadow: 0 0 12px rgba(0,188,212,0.35); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-mid);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(224,82,82,0.3);
    }
    .btn-danger:hover { background: var(--red-dim); }

    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 500;
    }
    .badge-cerulean { background: var(--cerulean-dim); color: var(--cerulean); border: 1px solid rgba(0,188,212,0.2); }
    .badge-green  { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(76,175,130,0.2); }
    .badge-amber  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid rgba(245,166,35,0.2); }
    .badge-red    { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(224,82,82,0.2); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(124,77,255,0.2); }
    .badge-dim    { background: var(--bg-panel);   color: var(--text-dim); border: 1px solid var(--border); }

    /* ── Form elements ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--cerulean);
      box-shadow: 0 0 0 2px rgba(0,188,212,0.12);
    }
    .form-select { cursor: pointer; }
    .form-textarea { resize: vertical; min-height: 80px; }

    /* ── Table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-mid);
      text-align: left;
    }
    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      vertical-align: middle;
    }
    .data-table tr:hover td { background: var(--bg-hover); }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--cerulean); border-bottom-color: var(--cerulean); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(8,12,16,0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 480px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--cerulean);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .page-title {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--cerulean);
      letter-spacing: 0.04em;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      font-family: var(--sans);
    }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--cerulean);
      line-height: 1;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state .empty-title { font-family: var(--mono); font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state .empty-body { font-size: 12px; max-width: 320px; margin: 0 auto; }

    /* ── Alert boxes ── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .alert-info { background: var(--cerulean-dim); border: 1px solid rgba(0,188,212,0.2); color: var(--cerulean); }
    .alert-warn { background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); }
    .alert-error { background: var(--red-dim); border: 1px solid rgba(224,82,82,0.2); color: var(--red); }

    /* ── Stage pipeline bar ── */
    .pipeline-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      overflow-x: auto;
    }
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .pipeline-stage-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      border: 2px solid var(--border-mid);
      background: var(--bg-deep);
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .pipeline-stage-dot.complete { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .pipeline-stage-dot.active { border-color: var(--cerulean); color: var(--cerulean); background: var(--cerulean-dim); box-shadow: 0 0 8px rgba(0,188,212,0.25); }
    .pipeline-stage-label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
    .pipeline-connector {
      flex: 1;
      min-width: 20px;
      height: 1px;
      background: var(--border);
      margin: 0 8px;
    }
    .pipeline-connector.complete { background: var(--green); opacity: 0.5; }

    /* ── Loading spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--cerulean);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      width: 100%;
      background: var(--bg-secondary);
      border-radius: 6px;
      overflow: hidden;
      height: 24px;
      position: relative;
      margin: 8px 0;
      border: 1px solid var(--border-mid);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cerulean), #3b82f6);
      border-radius: 6px;
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .progress-bar-fill.indeterminate {
      width: 30% !important;
      animation: indeterminate 1.5s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { margin-left: 0;   width: 30%; }
      50%  { margin-left: 35%; width: 30%; }
      100% { margin-left: 70%; width: 30%; }
    }
    .progress-bar-fill.complete { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .progress-bar-fill.error { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .progress-bar-fill.paused { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    .progress-bar-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      font-weight: 600;
      text-shadow: 0 0 3px var(--bg-primary);
    }

    /* ── Global task panel ── */
    #global-task-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1500;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-mid);
      display: none;
      flex-direction: column;
      font-size: 12px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }
    #global-task-bar.visible { display: flex; }
    .gtb-collapsed {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      cursor: pointer;
      user-select: none;
    }
    .gtb-collapsed:hover { background: var(--bg-secondary); }
    .gtb-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
    }
    .gtb-collapsed .gtb-label { font-weight: 600; white-space: nowrap; }
    .gtb-collapsed .gtb-progress { flex: 1; max-width: 400px; }
    .gtb-collapsed .gtb-detail { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; }
    .gtb-collapsed .gtb-chevron { margin-left: auto; color: var(--text-secondary); font-size: 14px; }
    .gtb-expanded {
      display: none;
      max-height: 260px;
      overflow-y: auto;
      border-top: 1px solid var(--border-mid);
    }
    #global-task-bar.expanded .gtb-expanded { display: block; }
    #global-task-bar.expanded .gtb-collapsed .gtb-chevron { transform: rotate(180deg); }
    .gtb-task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-light);
    }
    .gtb-task-row:last-child { border-bottom: none; }
    .gtb-task-row .gtb-task-label { font-weight: 600; white-space: nowrap; min-width: 110px; }
    .gtb-task-row .gtb-task-bar { flex: 1; max-width: 300px; }
    .gtb-task-row .gtb-task-detail { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; flex: 1; }
    .gtb-task-row .gtb-task-actions { display: flex; gap: 6px; }
    .gtb-task-row .gtb-task-actions button {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-mid);
      background: var(--bg-secondary);
      cursor: pointer;
      color: var(--text-primary);
    }
    .gtb-task-row .gtb-task-actions button:hover { background: var(--bg-tertiary, var(--border-mid)); }
    .gtb-task-row .gtb-task-actions button.btn-cancel { color: var(--red, #ef4444); border-color: var(--red, #ef4444); }
    .gtb-task-row .gtb-task-actions button.btn-cancel:hover { background: var(--red, #ef4444); color: #fff; }

    /* ── Toast notifications ── */
    #toast-container {
      position: fixed;
      bottom: 44px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toast-in 0.25s ease;
    }
    @keyframes toast-in { from { transform: translateX(20px); opacity: 0; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.info { border-left: 3px solid var(--cerulean); }
    .toast.warn { border-left: 3px solid var(--amber); }

    /* ═══════════════════════════════════════════════════════════
       VIEWS
       ═══════════════════════════════════════════════════════════ */

    /* ── Dashboard ── */
    .project-list { display: flex; flex-direction: column; gap: 10px; }
    .project-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .project-row:hover { border-color: var(--border-strong); background: var(--bg-hover); }
    .project-code { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--cerulean); width: 120px; flex-shrink: 0; }
    .project-name { flex: 1; font-size: 13px; }
    .project-ils { font-family: var(--mono); font-size: 11px; color: var(--text-dim); width: 180px; flex-shrink: 0; }
    .project-stages { display: flex; gap: 3px; flex-shrink: 0; }
    .stage-pip {
      width: 22px; height: 6px;
      border-radius: 2px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .stage-pip.done { background: var(--green); border-color: var(--green); }
    .stage-pip.active { background: var(--cerulean); border-color: var(--cerulean); }

    /* ── Mapping editor ── */
    .map-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .map-filter-input {
      flex: 1;
      min-width: 180px;
    }
    .map-row-approved { border-left: 2px solid var(--green) !important; }
    .map-row-ai { background: rgba(124,77,255,0.04) !important; }
    .map-row-flagged { border-left: 2px solid var(--amber) !important; }

    /* ── Project log ── */
    .log-terminal {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      height: 520px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
    }
    .log-line { display: flex; gap: 12px; }
    .log-ts { color: var(--text-dim); flex-shrink: 0; }
    .log-tag { flex-shrink: 0; width: 80px; }
    .log-msg { flex: 1; }
    .log-line.level-ok .log-tag, .log-line.level-ok .log-msg { color: var(--green); }
    .log-line.level-warn .log-tag, .log-line.level-warn .log-msg { color: var(--amber); }
    .log-line.level-err .log-tag, .log-line.level-err .log-msg { color: var(--red); }
    .log-line.level-info .log-msg { color: var(--text-primary); }
    .log-line.level-info .log-tag { color: var(--cerulean); }

    /* ── Suggestions board ── */
    .suggestion-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .suggestion-vote {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .vote-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      background: var(--bg-deep);
      border: 1px solid var(--border-mid);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .vote-btn:hover { border-color: var(--cerulean); color: var(--cerulean); }
    .vote-btn.voted { background: var(--cerulean-dim); border-color: var(--cerulean); color: var(--cerulean); }
    .vote-count { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .suggestion-body { flex: 1; }
    .suggestion-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .suggestion-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .suggestion-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Archive UI ── */
    .project-row.archived {
      opacity: 0.5;
      border-left: 3px solid var(--text-dim);
    }
    .project-row.archived .project-code { color: var(--text-dim); }
    .archive-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }
    .archive-toggle input { cursor: pointer; }

    /* ── Stage 2 Three-Panel Layout ── */
    .s2-panels {
      display: grid;
      grid-template-columns: 300px 1fr 340px;
      gap: 12px;
      height: calc(100vh - 200px);
      min-height: 500px;
    }
    .s2-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .s2-panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .s2-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .s2-file-item {
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      transition: background 0.15s;
    }
    .s2-file-item:hover { background: var(--bg-hover); }
    .s2-file-item.active { background: var(--cerulean-dim); border: 1px solid rgba(0,188,212,0.2); }
    .s2-chart-wrap { padding: 8px 0; }
    .s2-tag-list { margin-top: 8px; }
    .s2-tag-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      border-radius: var(--radius);
      transition: background 0.1s;
    }
    .s2-tag-row:hover { background: var(--bg-hover); }
    .s2-tag-row.active { background: var(--cerulean-dim); color: var(--cerulean); }
    .s2-record-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .s2-field-row {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      font-size: 11px;
      font-family: var(--mono);
      border-bottom: 1px solid var(--border);
    }
    .s2-field-tag { color: var(--cerulean); width: 36px; flex-shrink: 0; }
    .s2-field-ind { color: var(--text-dim); width: 20px; flex-shrink: 0; }
    .s2-field-content { flex: 1; word-break: break-all; }
    .s2-field-content .sf-code { color: var(--amber); }
    .s2-subfield-bar { height: 4px; border-radius: 2px; background: var(--cerulean-dim); margin-top: 2px; }
    .s2-map-item {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 11px;
    }
    .s2-map-item.approved { border-left: 3px solid var(--green); }
    .s2-map-item.pending { border-left: 3px solid var(--amber); }
    .s2-map-dup-src {
      background: var(--amber-dim); border-radius: 3px; padding: 0 4px;
      outline: 1px dashed var(--amber);
    }
    .s2-map-dup-tgt {
      background: var(--red-dim); border-radius: 3px; padding: 0 4px;
      outline: 1px dashed var(--red);
    }

    /* ── Transform info button + panel ── */
    .transform-info-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--cerulean-dim); border: 1px solid var(--border-mid);
      color: var(--cerulean); font-size: 11px; font-weight: 600;
      cursor: pointer; margin-left: 6px; vertical-align: middle;
      transition: background 0.15s, border-color 0.15s;
      font-family: var(--sans); line-height: 1; padding: 0;
    }
    .transform-info-btn:hover {
      background: var(--cerulean-glow); border-color: var(--cerulean);
    }
    .transform-info-panel {
      display: none; margin-top: 6px; padding: 8px 10px;
      background: var(--bg-hover); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 12px;
      color: var(--text-secondary); line-height: 1.5;
    }
    .transform-info-panel.visible { display: block; }
  </style>
</head>
<body>

<div id="app">
  <!-- ── Sidebar ── -->

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CERULEAN NEXT — FRONTEND SHELL
   Vanilla JS SPA. No build step. No framework.
   API_BASE points to FastAPI. All state in memory.
   ═══════════════════════════════════════════════════════════════════════ */

const API_BASE = window.location.origin + '/api/v1';

// ── XSS escaping ─────────────────────────────────────────────────────
// ALL server-supplied data interpolated into innerHTML MUST go through esc().
// Never interpolate raw API values directly into HTML template strings.
function esc(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── App state ────────────────────────────────────────────────────────
const state = {
  currentView: 'dashboard',
  currentProject: null,   // full project object
  projects: [],
};

// ── Router ──────────────────────────────────────────────────────────
function navigate(view, params = {}) {
  state.currentView = view;
  Object.assign(state, params);

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  // Show/hide project nav
  const hasProject = !!state.currentProject;
  document.getElementById('project-nav-label').style.display = hasProject ? '' : 'none';
  document.getElementById('project-nav').style.display = hasProject ? '' : 'none';

  // Render view
  const viewEl = document.getElementById('view');
  const renders = {
    dashboard:    renderDashboard,
    'new-project': renderNewProject,
    stage1:       renderStage1,
    stage2:       renderStage2,
    stage3:       window.renderStage3,
    stage4:       window.renderStage4,
    stage5:       window.renderStage5,
    stage6:       window.renderStage6,
    stage7:       window.renderStage7,
    stage8:       window.renderStage8,
    'project-log': renderProjectLog,
    'project-settings': renderProjectSettings,
    templates:    renderTemplates,
    suggestions:  renderSuggestions,
  };
  const renderer = renders[view];
  if (renderer) renderer(viewEl);
  updateBreadcrumb(view);
}

function updateBreadcrumb(view) {
  const labels = {
    dashboard: 'Dashboard',
    'new-project': 'New Project',
    stage1: 'Stage 1 — Data Ingest',
    stage2: 'Stage 2 — Analyze & Map',
    stage3: 'Stage 3 — Transform',
    stage4: 'Stage 4 — Validate & Dedup',
    stage5: 'Stage 5 — Items',
    stage6: 'Stage 6 — Patrons',
    stage7: 'Stage 7 — Push to Koha',
    stage8: 'Stage 8 — KTD Sandbox',
    'project-log': 'Project Log',
    'project-settings': 'Settings',
    templates: 'Templates',
    suggestions: 'Suggestions',
  };
  const crumb = document.getElementById('breadcrumb');
  const p = state.currentProject;
  if (p) {
    crumb.innerHTML = `<span class="text-dim">cerulean</span><span class="crumb-sep">/</span><span class="text-cerulean mono">${esc(p.code)}</span><span class="crumb-sep">/</span><span class="crumb-active">${esc(labels[view] || view)}</span>`;
  } else {
    crumb.innerHTML = `<span class="text-dim">cerulean</span><span class="crumb-sep">/</span><span class="crumb-active">${esc(labels[view] || view)}</span>`;
  }
  document.getElementById('topbar-actions').innerHTML = '';
}

// ── API helpers ──────────────────────────────────────────────────────
async function api(method, path, body = null) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${path}`, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.detail?.message || err.message || `HTTP ${res.status}`);
    }
    return res.status === 204 ? null : res.json();
  } catch (e) {
    toast(e.message, 'error');
    throw e;
  }
}

// ── Toast ────────────────────────────────────────────────────────────
window._lastToast = { msg: '', ts: 0 };
function toast(msg, type = 'info', duration = 4000) {
  // Suppress duplicate messages within 3 seconds
  const now = Date.now();
  if (msg === window._lastToast.msg && now - window._lastToast.ts < 3000) return;
  window._lastToast = { msg, ts: now };
  const icons = { success: '✓', error: '✕', info: 'ℹ', warn: '⚠' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ── Modal ────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── API health check ─────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res = await fetch(window.location.origin + '/api/health');
    const ok = res.ok;
    document.getElementById('api-dot').className = `status-dot ${ok ? 'ok' : 'err'}`;
    document.getElementById('api-status-text').textContent = ok ? 'API online' : 'API offline';
  } catch {
    document.getElementById('api-dot').className = 'status-dot err';
    document.getElementById('api-status-text').textContent = 'API offline';
  }
}

// ── Pipeline helpers ─────────────────────────────────────────────────
function pipelineBar(project) {
  const stages = [
    { n: 1, label: 'Ingest' },
    { n: 2, label: 'Map' },
    { n: 3, label: 'Transform' },
    { n: 4, label: 'Dedup' },
    { n: 5, label: 'Items' },
    { n: 6, label: 'Patrons' },
    { n: 7, label: 'Push' },
    { n: 8, label: 'Sandbox' },
  ];
  return `<div class="pipeline-bar">
    ${stages.map((s, i) => {
      const done = project[`stage_${s.n}_complete`];
      const active = project.current_stage === s.n && !done;
      return `
        ${i > 0 ? `<div class="pipeline-connector${done ? ' complete' : ''}"></div>` : ''}
        <div class="pipeline-stage">
          <div class="pipeline-stage-dot ${done ? 'complete' : active ? 'active' : ''}">
            ${done ? '✓' : s.n}
          </div>
          <div class="pipeline-stage-label">${s.label}</div>
        </div>`;
    }).join('')}
  </div>`;
}

function updateStageBadges(project) {
  for (let i = 1; i <= 8; i++) {
    const badge = document.getElementById(`badge-s${i}`);
    if (!badge) continue;
    const done = project[`stage_${i}_complete`];
    badge.textContent = done ? '✓' : (project.current_stage === i ? '●' : '—');
    badge.parentElement.classList.toggle('stage-complete', done);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════════════════════

// ── Dashboard ────────────────────────────────────────────────────────
let _showArchived = false;

async function renderDashboard(el) {
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">All migration projects</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <label class="archive-toggle">
          <input type="checkbox" id="show-archived-toggle" ${_showArchived ? 'checked' : ''} onchange="_showArchived=this.checked;renderDashboard(document.getElementById('view'))">
          Show archived
        </label>
        <button class="btn btn-primary" onclick="navigate('new-project')">+ New Project</button>
      </div>
    </div>
    <div id="project-list-wrap"><div class="spinner"></div></div>`;

  try {
    const projects = await api('GET', `/projects?include_archived=${_showArchived}`);
    state.projects = projects;
    const wrap = document.getElementById('project-list-wrap');

    if (!projects.length) {
      wrap.innerHTML = `<div class="empty-state">
        <div class="empty-icon">◫</div>
        <div class="empty-title">No projects yet</div>
        <div class="empty-body">Create a new migration project to get started.</div>
      </div>`;
      return;
    }

    wrap.innerHTML = `<div class="project-list">
      ${projects.map(p => `

async function uploadFiles(fileList) {
  const p = state.currentProject;
  const wrap = document.getElementById('file-table-wrap');
  for (const file of fileList) {
    await _uploadSingleFile(p, file, wrap, 'auto');
  }
  // Poll file list until all are indexed
  pollFileStatus();
}

async function _uploadSingleFile(project, file, wrap, mode) {
  const fd = new FormData();
  fd.append('file', file);
  // Show upload progress bar
  const uploadId = 'upload-' + Date.now();
  if (wrap) {
    const div = document.createElement('div');
    div.id = uploadId;
    div.style.marginBottom = '8px';
    div.innerHTML = renderProgressBar({ label: `Uploading ${file.name}…` });
    wrap.prepend(div);
  }
  try {
    const url = `${API_BASE}/projects/${project.id}/files?mode=${mode}`;
    const res = await fetch(url, { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: { message: res.statusText } }));
      // Handle duplicate filename — show choice modal
      if (res.status === 409 && err.detail?.error === 'DUPLICATE_FILENAME') {
        const el = document.getElementById(uploadId);
        if (el) el.remove();
        _showDuplicateModal(project, file, wrap, err.detail);
        return;
      }
      throw new Error(err.detail?.message || err.detail || `HTTP ${res.status}`);
    }
    const el = document.getElementById(uploadId);
    if (el) el.innerHTML = renderProgressBar({ percent: 100, label: `${file.name} — indexing…`, detail: 'Processing…' });
    toast(`${file.name} uploaded — indexing started`, 'success');
  } catch (e) {
    const el = document.getElementById(uploadId);
    if (el) el.innerHTML = renderProgressBar({ percent: 100, label: `${file.name} failed`, status: 'error', detail: e.message });
    toast(`Upload failed (${file.name}): ${e.message}`, 'error');
  }
}

function _showDuplicateModal(project, file, wrap, detail) {
  const fname = esc(detail.existing_file_id ? file.name : 'this file');
  const existCount = detail.existing_record_count ?? '?';
  const existStatus = detail.existing_status || 'unknown';
  openModal(`
    <div class="modal-title">Duplicate Filename</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
      A file named <strong class="mono">${esc(file.name)}</strong> already exists in this project
      (${existCount} records, status: ${esc(existStatus)}).
    </p>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">What would you like to do?</p>
    <div class="modal-footer" style="gap:8px">
      <button class="btn btn-ghost" onclick="closeModal()">Skip</button>
      <button class="btn btn-ghost" onclick="_dupAction('add')">Add as New</button>
      <button class="btn btn-primary" onclick="_dupAction('replace')">Replace Existing</button>
    </div>`);
  // Store context for the action handler
  window._dupCtx = { project, file, wrap };
}

async function _dupAction(mode) {
  closeModal();
  const ctx = window._dupCtx;
  if (!ctx) return;
  window._dupCtx = null;
  await _uploadSingleFile(ctx.project, ctx.file, ctx.wrap, mode);
  pollFileStatus();
}

function pollFileStatus() {
  const p = state.currentProject;
  if (!p) return;
  let attempts = 0;
  const poll = async () => {
    attempts++;
    try {
      const files = await api('GET', `/projects/${p.id}/files`);
      const pending = (files || []).filter(f => f.status !== 'indexed' && f.status !== 'error' && f.status !== 'not_marc');
      if (pending.length === 0 || attempts > 60) {
        loadFiles(); // final refresh
        return;
      }
    } catch {}
    loadFiles(); // refresh table with current status
    setTimeout(poll, 3000);
  };
  setTimeout(poll, 2000);
}

function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor = 'var(--border-mid)';

function s2RenderTags() {

  const tags = s2.tagData.tags || {};

  const topTags = sortedTags.slice(0, 20);

  section.innerHTML = `
    <div style="margin-top:16px;margin-bottom:8px;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em">

  s2.tagChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: topTags.map(t => t[0]),
      datasets: [{
        data: topTags.map(t => t[1]),
        backgroundColor: 'rgba(0,188,212,0.4)',
        borderColor: 'rgba(0,188,212,0.8)',

function _marcSubSort(s) {
  if (!s) return '\xff';
  const c = s.replace('$','');
  return (c >= '0' && c <= '9') ? '\x00' + c : '\x01' + c.toLowerCase();
}

async function s2LoadMaps() {
  const p = state.currentProject;
  try {
    const maps = await api('GET', `/projects/${p.id}/maps`);
    s2.maps = (maps || []).sort((a, b) =>
      (a.source_tag || '').localeCompare(b.source_tag || '')
      || _marcSubSort(a.source_sub).localeCompare(_marcSubSort(b.source_sub))
    );
    s2RenderMaps();
  } catch (e) { console.error(e); }
}

function s2RenderMaps() {
  const right = document.getElementById('s2-right');
  if (!right) return;

  if (!s2.maps.length) {
    right.innerHTML = `<div class="text-dim" style="font-size:12px;text-align:center;padding:20px">No maps yet. Click + Add or run AI Suggest.</div>`;
    return;
  }

  // Detect duplicate source and target field keys
  const srcCount = {}, tgtCount = {};
  s2.maps.forEach(m => {
    const sk = m.source_tag + (m.source_sub || '');
    const tk = m.target_tag + (m.target_sub || '');
    srcCount[sk] = (srcCount[sk] || 0) + 1;
    tgtCount[tk] = (tgtCount[tk] || 0) + 1;
  });

  right.innerHTML = `
    <div style="margin-bottom:8px;display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="approveAll()" style="font-size:10px">✓ Approve All</button>
    </div>
    ${s2.maps.map(m => {
      const sk = m.source_tag + (m.source_sub || '');
      const tk = m.target_tag + (m.target_sub || '');
      const dupSrc = srcCount[sk] > 1;
      const dupTgt = tgtCount[tk] > 1;
      const origin = m.source_label.startsWith('template')
        ? '<span class="badge badge-cerulean" style="font-size:9px">tmpl</span>'
        : m.ai_suggested
        ? '<span class="badge badge-purple" style="font-size:9px">AI</span>'
        : '<span class="badge badge-dim" style="font-size:9px">man</span>';
      return `<div class="s2-map-item ${m.approved ? 'approved' : 'pending'}" style="cursor:pointer" data-map-id="${esc(m.id)}" onclick="openEditMapModal('${esc(m.id)}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span class="mono text-cerulean ${dupSrc ? 's2-map-dup-src' : ''}" ${dupSrc ? 'title="Multiple maps read from this source field"' : ''}>${esc(m.source_tag)}${esc(m.source_sub||'')}</span>
          <span class="text-dim" style="font-size:10px">→</span>
          <span class="mono ${dupTgt ? 's2-map-dup-tgt' : ''}" ${dupTgt ? 'title="Multiple maps write to this target field"' : ''}>${esc(m.target_tag)}${esc(m.target_sub||'')}</span>
          ${origin}
          <span class="badge ${m.approved ? 'badge-green' : 'badge-amber'}" style="font-size:9px">${m.approved ? '✓' : '?'}</span>
        </div>
        <div style="display:flex;gap:4px;align-items:center;justify-content:space-between">
          <span class="text-dim" style="font-size:10px">${esc(m.transform_type)}${m.preset_key ? ':' + esc(m.preset_key) : ''}${m.delete_source ? ' ⊘src' : ''}${m.ai_confidence != null ? ' · ' + Math.round(m.ai_confidence*100) + '%' : ''}</span>

async function s2LoadAndCachePresets() {
  if (s2.presetCache) return s2.presetCache;
  try {
    s2.presetCache = await api('GET', '/reference/transform-presets');
  } catch (e) { console.error('Failed to load presets:', e); s2.presetCache = []; }
  return s2.presetCache;
}

const TRANSFORM_DESCRIPTIONS = {
  'copy': 'Direct copy — copies the source field value to the target field without any modification.',
  'custom:regex': 'Regex substitution — enter a pattern like s/old/new/ to transform the value using a regular expression.',
  'custom:const': 'Constant value — ignores the source field and always writes the value you specify.',
  'custom:fn': 'Python expression — a Python lambda applied to the value, e.g. value.split(",")[0].',
  'custom:lookup': 'Lookup table — maps source values to target values using a JSON lookup table, e.g. {"a":"1","b":"2"}.',
};

function buildUnifiedTransformOptions(presets, selectedValue) {
  let html = `<option value="copy" ${selectedValue === 'copy' ? 'selected' : ''}>Copy (direct)</option>`;
  // Group presets by category
  const catOrder = ['date', 'case', 'text', 'clean', 'extract'];
  const catLabels = { date: 'Date', case: 'Case', text: 'Text', clean: 'Clean', extract: 'Extract' };
  const grouped = {};
  (presets || []).forEach(p => {
    if (p.key === 'const_value') return; // redundant with Custom constant value
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });
  catOrder.forEach(cat => {
    const items = grouped[cat];
    if (!items || !items.length) return;
    html += `<optgroup label="${esc(catLabels[cat] || cat)}">`;
    items.forEach(p => {
      const val = `preset:${p.key}`;
      html += `<option value="${esc(val)}" ${selectedValue === val ? 'selected' : ''}>${esc(p.label)}</option>`;
    });
    html += '</optgroup>';
  });
  // Custom section
  html += '<optgroup label="Custom">';
  html += `<option value="custom:regex" ${selectedValue === 'custom:regex' ? 'selected' : ''}>Custom regex</option>`;
  html += `<option value="custom:const" ${selectedValue === 'custom:const' ? 'selected' : ''}>Custom constant value</option>`;
  html += `<option value="custom:fn" ${selectedValue === 'custom:fn' ? 'selected' : ''}>Custom expression</option>`;
  html += `<option value="custom:lookup" ${selectedValue === 'custom:lookup' ? 'selected' : ''}>Custom lookup</option>`;
  html += '</optgroup>';
  return html;
}

function parseUnifiedTransformValue(val) {
  if (!val || val === 'copy') return { transform_type: 'copy', preset_key: null, needsExpression: false };
  if (val.startsWith('preset:')) return { transform_type: 'preset', preset_key: val.slice(7), needsExpression: false };
  if (val === 'custom:regex') return { transform_type: 'regex', preset_key: null, needsExpression: true };
  if (val === 'custom:const') return { transform_type: 'const', preset_key: null, needsExpression: true };
  if (val === 'custom:fn') return { transform_type: 'fn', preset_key: null, needsExpression: true };
  if (val === 'custom:lookup') return { transform_type: 'lookup', preset_key: null, needsExpression: true };
  return { transform_type: val, preset_key: null, needsExpression: false };
}

function encodeUnifiedTransformValue(transformType, presetKey) {
  if (transformType === 'preset' && presetKey) return `preset:${presetKey}`;
  if (transformType === 'copy') return 'copy';
  if (transformType === 'regex') return 'custom:regex';
  if (transformType === 'const') return 'custom:const';
  if (transformType === 'fn') return 'custom:fn';
  if (transformType === 'lookup') return 'custom:lookup';
  return 'copy';
}

function getTransformDescription(unifiedValue) {
  if (TRANSFORM_DESCRIPTIONS[unifiedValue]) return TRANSFORM_DESCRIPTIONS[unifiedValue];
  if (unifiedValue && unifiedValue.startsWith('preset:') && s2.presetCache) {
    const key = unifiedValue.slice(7);
    const p = s2.presetCache.find(x => x.key === key);
    if (p) return `${p.label} — ${p.description}`;
  }
  return '';
}

function toggleTransformInfo() {
  const panel = document.getElementById('nm-transform-info');
  if (!panel) return;
  const isVisible = panel.classList.toggle('visible');
  if (isVisible) {
    const sel = document.getElementById('nm-transform');
    panel.textContent = getTransformDescription(sel?.value) || 'Select a transform to see its description.';
  }
}

function s2OnTransformTypeChange() {
  const sel = document.getElementById('nm-transform');
  const fnGroup = document.getElementById('nm-fn-group');
  if (!sel) return;
  const parsed = parseUnifiedTransformValue(sel.value);
  if (fnGroup) fnGroup.style.display = parsed.needsExpression ? '' : 'none';
  // Update info panel if visible
  const panel = document.getElementById('nm-transform-info');
  if (panel && panel.classList.contains('visible')) {
    panel.textContent = getTransformDescription(sel.value) || 'Select a transform to see its description.';
  }
}

async function runAISuggest() {
  const p = state.currentProject;
  const progEl = document.getElementById('ai-suggest-progress');
  const btnEl = document.getElementById('btn-ai-suggest');
  try {
    // Snapshot current map count to detect new AI maps
    const before = await api('GET', `/projects/${p.id}/maps`);
    const beforeCount = (before || []).length;

    const res = await api('POST', `/projects/${p.id}/maps/ai-suggest`);
    if (btnEl) btnEl.style.display = 'none';
    if (progEl) { progEl.style.display = ''; progEl.innerHTML = renderProgressBar({ label: 'AI analyzing…' }); }

    // Poll for new maps every 3s, up to 2 minutes
    let attempts = 0;
    const maxAttempts = 40;
    const pollAI = async () => {
      attempts++;
      if (progEl) {
        const pct = Math.min(95, (attempts / maxAttempts) * 100);
        progEl.innerHTML = renderProgressBar({ percent: pct, label: 'AI analyzing…', detail: `${attempts * 3}s elapsed` });
      }
      try {
        const current = await api('GET', `/projects/${p.id}/maps`);
        if ((current || []).length > beforeCount) {
          const newCount = (current || []).length - beforeCount;
          if (progEl) { progEl.innerHTML = renderProgressBar({ percent: 100, label: `${newCount} suggestion${newCount === 1 ? '' : 's'} added`, status: 'complete' }); }
          toast(`${newCount} AI suggestion${newCount === 1 ? '' : 's'} ready for review`, 'success');
          s2.maps = current || [];
          s2RenderMaps();
          setTimeout(() => { if (progEl) progEl.style.display = 'none'; if (btnEl) btnEl.style.display = ''; }, 3000);
          return;
        }
      } catch (e) { /* ignore poll errors */ }
      if (attempts < maxAttempts) {
        setTimeout(pollAI, 3000);
      } else {
        if (progEl) { progEl.innerHTML = renderProgressBar({ percent: 100, label: 'Timed out — check manually', status: 'error' }); }
        setTimeout(() => { if (progEl) progEl.style.display = 'none'; if (btnEl) btnEl.style.display = ''; }, 3000);
      }
    };
    setTimeout(pollAI, 3000);
  } catch (e) {
    console.error(e);
    if (progEl) { progEl.innerHTML = renderProgressBar({ percent: 100, label: 'AI suggest failed', status: 'error' }); }
    setTimeout(() => { if (progEl) progEl.style.display = 'none'; if (btnEl) btnEl.style.display = ''; }, 3000);
  }
}

async function loadLog() {
  const p = state.currentProject;
  const stage = document.getElementById('log-stage-filter')?.value || '';
  const level = document.getElementById('log-level-filter')?.value || '';
  const term = document.getElementById('log-terminal');
  if (!term) return;

  try {
    let url = `/projects/${p.id}/log?limit=500`;
    if (stage) url += `&stage=${stage}`;
    if (level) url += `&level=${level}`;
    const data = await api('GET', url);

    if (!data.items.length) {
      term.innerHTML = `<div class="text-dim">No log entries found.</div>`;
      return;
    }

    const levelClass = { info: 'level-info', warn: 'level-warn', error: 'level-err', complete: 'level-ok' };
    term.innerHTML = data.items.slice().reverse().map(e =>
      `<div class="log-line ${levelClass[e.level] || 'level-info'}">
        <span class="log-ts">${new Date(e.created_at).toISOString().slice(11,19)}</span>
        <span class="log-tag">${e.tag || (e.stage ? `[s${e.stage}]` : '[sys]')}</span>
        <span class="log-msg">${e.message}</span>
      </div>`
    ).join('');

    // Summary counts
    const counts = data.items.reduce((acc, e) => { acc[e.level] = (acc[e.level]||0)+1; return acc; }, {});
    const summary = document.getElementById('log-summary');
    if (summary) {
      summary.innerHTML = `
        <span class="text-green">✓ ${counts.complete||0} complete</span>
        <span class="text-dim">· ${counts.info||0} info</span>
        <span class="text-amber">· ${counts.warn||0} warnings</span>
        <span class="text-red">· ${counts.error||0} errors</span>
        <span class="text-dim">· ${data.total} total</span>`;
    }
  } catch (e) { console.error(e); }
}

async function saveProjectSettings() {
  const p = state.currentProject;
  const statusEl = document.getElementById('ps-status');
  const body = {};

  const name = document.getElementById('ps-name').value.trim();
  const sourceIls = document.getElementById('ps-source-ils').value.trim();
  const kohaUrl = document.getElementById('ps-koha-url').value.trim();
  const authType = document.getElementById('ps-koha-auth-type').value;

  // Build token based on auth type
  let kohaToken = '';
  if (authType === 'basic') {
    const user = document.getElementById('ps-koha-user').value.trim();
    const pass = document.getElementById('ps-koha-pass').value;
    if (user && pass) kohaToken = user + ':' + pass;
  } else {
    const tokenEl = document.getElementById('ps-koha-token');
    kohaToken = tokenEl ? tokenEl.value.trim() : '';
  }

  if (name !== (p.library_name || '')) body.library_name = name || null;
  if (sourceIls !== (p.source_ils || '')) body.source_ils = sourceIls || null;
  if (kohaUrl !== (p.koha_url || '')) body.koha_url = kohaUrl || null;
  if (authType !== (p.koha_auth_type || 'basic')) body.koha_auth_type = authType;
  if (kohaToken) body.koha_token = kohaToken;

  if (!Object.keys(body).length) {
    statusEl.innerHTML = '<span class="text-secondary" style="font-size:12px">No changes to save.</span>';
    return;
  }

  try {
    const updated = await api('PATCH', `/projects/${p.id}`, body);
    state.currentProject = updated;
    toast('Project settings saved', 'success');
    renderProjectSettings(document.getElementById('view'));
  } catch (e) {
    console.error(e);
    statusEl.innerHTML = `<span class="text-red" style="font-size:12px">Failed to save: ${e.message || e}</span>`;
  }
}

async function loadSuggestions() {
  const type = document.getElementById('sg-type-filter')?.value || '';
  const status = document.getElementById('sg-status-filter')?.value || '';
  const wrap = document.getElementById('suggestions-list');
  if (!wrap) return;

  try {
    let url = '/suggestions';
    const params = [];
    if (type) params.push(`type=${type}`);
    if (status) params.push(`status=${status}`);
    if (params.length) url += '?' + params.join('&');

    const items = await api('GET', url);
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">No suggestions found</div></div>`;
      return;
    }

    const typeBadge = { feature: 'badge-cerulean', bug: 'badge-red', workflow: 'badge-green', discussion: 'badge-amber' };
    const statusBadge2 = { open: 'badge-dim', confirmed: 'badge-cerulean', in_progress: 'badge-amber', shipped: 'badge-green', closed: 'badge-dim' };

    wrap.innerHTML = items.map(s => `
      <div class="suggestion-card" style="border-left:3px solid ${s.type==='feature'?'var(--cerulean)':s.type==='bug'?'var(--red)':s.type==='workflow'?'var(--green)':'var(--amber)'}">
        <div class="suggestion-vote">
          <button class="vote-btn" data-suggestion-id="${esc(s.id)}" onclick="voteSuggestion(this.dataset.suggestionId, this)">▲</button>
          <div class="vote-count">${s.vote_count}</div>
        </div>
        <div class="suggestion-body">
          <div class="suggestion-title">${esc(s.title)}</div>
          <div class="suggestion-desc">${esc(s.body)}</div>
          <div class="suggestion-meta">
            <span class="badge ${typeBadge[s.type] || 'badge-dim'}">${esc(s.type)}</span>
            <span class="badge ${statusBadge2[s.status] || 'badge-dim'}">${esc(s.status)}</span>
            ${s.submitted_by ? `<span class="text-dim" style="font-size:11px">${esc(s.submitted_by)}</span>` : ''}
            <span class="text-dim" style="font-size:11px">${new Date(s.created_at).toLocaleDateString()}</span>
          </div>
        </div>
      </div>`).join('');
  } catch (e) {
    console.error('loadSuggestions failed:', e);
    if (wrap) wrap.innerHTML = `<div class="empty-state"><div class="empty-title">Failed to load — try refreshing</div></div>`;
  }
}

async function voteSuggestion(id, btn) {
  // User identity is derived from the JWT on the server — do not pass email as a parameter.
  if (btn) btn.disabled = true;
  try {
    const res = await api('POST', `/suggestions/${id}/vote`);
    btn.classList.toggle('voted', res.voted);
    btn.nextElementSibling.textContent = res.vote_count;
  } catch (e) {
    console.error('voteSuggestion failed:', e);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── Auth state ─────────────────────────────────────────────────────
let _authToken = sessionStorage.getItem('cerulean_token') || '';

// Override api() to include auth header
window.api = async function(method, path, body = null) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        ..._authToken ? { 'Authorization': `Bearer ${_authToken}` } : {},
      },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${path}`, opts);
    if (res.status === 401) { showLoginModal(); return null; }
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.detail?.message || err.message || `HTTP ${res.status}`);
    }
    return res.status === 204 ? null : res.json();
  } catch (e) {
    toast(e.message, 'error');
    throw e;
  }
};

function showLoginModal() {
  openModal(`
    <div class="modal-title">Sign In</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="login-user" value="admin" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-pass" value="admin" />
    </div>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-bottom:8px"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    </div>`);
}

async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  try {
    const res = await fetch(`${API_BASE}/auth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p }),
    });
    if (!res.ok) {
      document.getElementById('login-err').textContent = 'Invalid credentials';
      return;
    }
    const data = await res.json();
    _authToken = data.access_token;
    sessionStorage.setItem('cerulean_token', _authToken);
    closeModal();
    toast('Signed in', 'success');
    navigate(state.currentView);
  } catch (e) {
    document.getElementById('login-err').textContent = e.message;
  }
}

async function runTransform() {

        try {
          const latest = await window.api('GET', `/projects/${p.id}/transform/manifest`);
          if (latest && latest.length && latest[0].status !== 'running') {
            renderS3Manifest(); // re-render with final results
            return;

        } catch { /* ignore */ }
        setTimeout(pollManifest, 3000);
      };
      setTimeout(pollManifest, 3000);

    const statusBadge = m.status==='complete'?'badge-green':m.status==='error'?'badge-red':'badge-amber';

    // Fetch Celery task result for map stats

function s3PreviewNav(dir) {
  const next = (window._s3PreviewIdx || 0) + dir;
  if (next < 0 || next >= (window._s3TotalRecords || 1)) return;

async function s3LoadPreview(idx) {
  const p = state.currentProject;
  const el = document.getElementById('s3-preview');
  const idxEl = document.getElementById('s3-preview-index');
  if (!el) return;
  el.innerHTML = `<div class="spinner"></div>`;
  try {
    const r = await window.api('GET', `/projects/${p.id}/transform/preview?record_index=${idx}`);
    if (!r) { el.innerHTML = `<div class="text-secondary">Could not load preview.</div>`; return; }
    if (idxEl) idxEl.textContent = `${idx + 1} / ${r.total_records}`;

    const orig = r.original;
    const trans = r.transformed;

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <h4 style="margin:0 0 8px;font-size:13px;color:var(--text-secondary)">Original</h4>
          <div style="background:var(--bg-secondary);border-radius:6px;padding:12px;max-height:400px;overflow:auto;font-size:12px;font-family:var(--font-mono)">
            ${orig ? s3RenderFields(orig.fields) : '<span class="text-dim">Not available</span>'}
          </div>
        </div>
        <div>
          <h4 style="margin:0 0 8px;font-size:13px;color:var(--accent)">Transformed</h4>
          <div style="background:var(--bg-secondary);border-radius:6px;padding:12px;max-height:400px;overflow:auto;font-size:12px;font-family:var(--font-mono)">
            ${trans ? s3RenderFields(trans.fields, orig ? orig.fields : null) : '<span class="text-dim">Not available</span>'}
          </div>
        </div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--text-secondary)">
        Title: <strong>${esc(trans?.title || orig?.title || '—')}</strong>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="text-secondary">Preview not available.</div>`;
  }
  // Keep the preview card in view after content swap
  const card = el.closest('.card');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function s3RenderFields(fields, compareFields) {
  if (!fields || !fields.length) return '<span class="text-dim">No fields</span>';
  // Build a set of original field strings for diff highlighting
  const origSet = new Set();
  if (compareFields) {
    compareFields.forEach(f => origSet.add(JSON.stringify(f)));
  }

  return fields.map(f => {
    const isNew = compareFields && !origSet.has(JSON.stringify(f));
    const highlight = isNew ? 'style="background:rgba(34,197,94,0.12);border-radius:3px;padding:1px 3px"' : '';
    if (f.data !== undefined) {
      return `<div ${highlight}><span style="color:var(--accent)">${esc(f.tag)}</span> ${esc(f.data)}</div>`;
    }
    const subs = (f.subfields||[]).map(s => `<span style="color:var(--text-secondary)">$${esc(s.code)}</span> ${esc(s.value)}`).join(' ');
    return `<div ${highlight}><span style="color:var(--accent)">${esc(f.tag)}</span> ${esc(f.ind1||' ')}${esc(f.ind2||' ')} ${subs}</div>`;
  }).join('');
}

async function s3AcceptTransform() {

async function s3RejectTransform() {

}

async function renderS4Clusters() {
  const p = state.currentProject;
  const wrap = document.getElementById('s4-tab');
  const rules = await window.api('GET', `/projects/${p.id}/dedup/rules`);
  const active = rules?.find(r => r.active);
  if (!active) {
    wrap.innerHTML = `<div class="alert alert-warn">Activate a rule first, then run a scan to see clusters.</div>`;
    return;
  }
  wrap.innerHTML = `<div class="spinner"></div>`;
  try {
    const data = await window.api('GET', `/projects/${p.id}/dedup/clusters?rule_id=${active.id}&resolved=false&limit=100`);
    const clusters = data?.items || [];
    const total = data?.total || 0;
    if (!clusters.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">No open clusters</div><div class="empty-body">Run a scan to detect duplicates.</div></div>`;
      return;
    }
    wrap.innerHTML = `

      <table class="data-table">
        <thead><tr><th>Match Key</th><th>Records</th><th>Primary</th><th>Action</th></tr></thead>
        <tbody>
          ${clusters.map(c => `<tr>

function viewCluster(id, cluster) {
  const records = cluster.records || [];
  openModal(`
    <div class="modal-title">Cluster — ${esc(cluster.match_key || id.slice(0,8))}</div>
    <div style="margin-bottom:16px;font-size:12px;color:var(--text-secondary)">${records.length} duplicate records. Select which to keep as primary:</div>

async function resolveCluster(clusterId) {
  const p = state.currentProject;
  const selected = document.querySelector('input[name="primary"]:checked');
  if (!selected) return;
  await window.api('PATCH', `/projects/${p.id}/dedup/clusters/${clusterId}`, {
    primary_index: parseInt(selected.value),

  closeModal();
  toast('Cluster resolved', 'success');
  renderS4Clusters();
}

async function recSaveRule() {
  const p = state.currentProject;
  const vocab = document.getElementById('rule-vocab')?.value;
  const operation = document.getElementById('rule-operation')?.value;

  // Collect source values from checkboxes + freetext
  const checked = [...document.querySelectorAll('.rule-src-check:checked')].map(cb => cb.value);
  const freetext = (document.getElementById('rule-source-freetext')?.value || '')
    .split(',').map(s => s.trim()).filter(Boolean);
  const sourceValues = [...new Set([...checked, ...freetext])];

  const targetValue = document.getElementById('rule-target-value')?.value?.trim() || null;
  const deleteMode = document.getElementById('rule-delete-mode')?.value || null;

  if (!sourceValues.length) { toast('Select or enter at least one source value', 'warn'); return; }

  try {
    await window.api('POST', `/projects/${p.id}/reconcile/rules`, {
      vocab_category: vocab,
      operation,
      source_values: sourceValues,
      target_value: operation !== 'delete' ? targetValue : null,
      delete_mode: operation === 'delete' ? deleteMode : null,

async function renderPatronUpload() {
  const p = state.currentProject;
  const wrap = document.getElementById('patron-tab');
  if (!wrap) return;
  wrap.innerHTML = '<div class="spinner"></div>';

  // Fetch patron files list and available Stage 1 files in parallel
  let patronFiles = [];
  let availableFiles = [];
  try { patronFiles = await window.api('GET', `/projects/${p.id}/patrons/files`); } catch(e) {}
  try { availableFiles = await window.api('GET', `/projects/${p.id}/patrons/available-files`); } catch(e) {}

  const anyParsing = patronFiles.some(f => f.status === 'parsing');

  // Build patron files table rows
  const _statusBadge = (s) => s === 'parsed'
    ? '<span class="badge badge-green">Parsed</span>'
    : s === 'parsing' ? '<span class="badge badge-amber">Parsing...</span>'
    : s === 'error' ? '<span class="badge badge-red">Error</span>'
    : '<span class="badge badge-dim">Uploaded</span>';

  const patronFileRows = patronFiles.length ? patronFiles.map(f => `
    <tr>
      <td class="mono" style="white-space:nowrap">${esc(f.filename)}</td>
      <td class="mono">${esc(f.detected_format || f.file_format || '—')}</td>
      <td class="mono">${f.row_count != null ? f.row_count.toLocaleString() : '—'}</td>
      <td>${(f.column_headers || []).length ? `<span class="text-dim" style="font-size:10px">${f.column_headers.length} cols</span>` : '—'}</td>
      <td>${_statusBadge(f.status)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-danger btn-sm" style="font-size:10px" onclick="deleteSinglePatronFile('${f.id}')">Delete</button>
      </td>
    </tr>`).join('') : '';

  const totalRows = patronFiles.reduce((sum, f) => sum + (f.row_count || 0), 0);

  // Build Stage 1 selection rows (exclude already-selected filenames)
  const selectedNames = new Set(patronFiles.map(f => f.filename));
  const selectableFiles = availableFiles.filter(f => !selectedNames.has(f.filename));
  const selectRows = selectableFiles.length ? selectableFiles.map(f => `
    <tr>
      <td class="mono" style="white-space:nowrap">${esc(f.filename)}${f.is_patron_likely ? ' <span class="badge badge-amber" style="font-size:9px;vertical-align:middle">Likely patron</span>' : ''}</td>
      <td class="mono">${esc(f.file_format || '—')}</td>
      <td class="mono">${f.file_size_bytes != null ? (f.file_size_bytes / 1024).toFixed(1) + ' KB' : '—'}</td>
      <td><button class="btn btn-primary btn-sm" style="font-size:10px" onclick="selectPatronFile('${f.file_id}')">Add</button></td>
    </tr>`).join('') : '';

  wrap.innerHTML = `
    <div class="card" style="max-width:900px">
      <div class="card-header">
        <span class="card-title">Patron Files${patronFiles.length ? ` (${patronFiles.length})` : ''}</span>
        ${patronFiles.length ? `<button class="btn btn-danger btn-sm" style="font-size:10px" onclick="deleteAllPatronFiles()">Delete All</button>` : ''}
      </div>
      ${patronFiles.length ? `
      <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:8px">
        <table class="data-table" style="font-size:11px;width:100%">
          <thead><tr><th>Filename</th><th>Format</th><th>Rows</th><th>Columns</th><th>Status</th><th></th></tr></thead>
          <tbody>${patronFileRows}</tbody>
        </table>
      </div>
      <div class="text-dim" style="font-size:11px;margin-bottom:4px">Combined rows: <strong>${totalRows.toLocaleString()}</strong></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-ghost btn-sm" onclick="reparsePatronFiles()">Re-parse All</button>
      </div>` : `
      <p class="text-dim" style="font-size:12px;margin-bottom:0">No patron files added yet. Select from Stage 1 uploads or upload a new file below.</p>`}
    </div>

    ${patronFiles.some(f => f.status === 'parsed') ? `
    <div class="card" style="max-width:none;margin-top:16px">
      <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
        <span class="card-title">Data Preview</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="text-dim" style="font-size:11px" id="patron-preview-info"></span>
          <button class="btn btn-ghost btn-sm" style="font-size:10px" id="patron-preview-prev" onclick="_patronPreviewPage(-1)" disabled>&laquo; Prev</button>
          <button class="btn btn-ghost btn-sm" style="font-size:10px" id="patron-preview-next" onclick="_patronPreviewPage(1)" disabled>Next &raquo;</button>
        </div>
      </div>
      <div id="patron-preview" style="min-height:60px"><div class="spinner" style="margin:16px 0"></div></div>
    </div>` : ''}

    <div class="card" style="max-width:900px;margin-top:16px">
      <div class="card-header"><span class="card-title">Add Files</span></div>
      ${selectableFiles.length ? `
      <p class="text-secondary" style="font-size:12px;margin-bottom:8px">Select from Stage 1 uploads:</p>
      <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:12px">
        <table class="data-table" style="font-size:11px;width:100%">
          <thead><tr><th>Filename</th><th>Format</th><th>Size</th><th></th></tr></thead>
          <tbody>${selectRows}</tbody>
        </table>
      </div>
      <div id="patron-select-status"></div>` : `
      <p class="text-secondary" style="font-size:12px;margin-bottom:12px">No additional Stage 1 files available.</p>`}
      <details style="margin-top:4px">
        <summary style="cursor:pointer;font-weight:600;font-size:12px;padding:4px 0">Or upload a new file</summary>

        </form>
        <div id="patron-upload-status" style="margin-top:8px"></div>
      </details>
    </div>

    `;

  // Attach upload form handler
  document.getElementById('patron-upload-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('patron-file-input');
    if (!input.files.length) { toast('Select a file first', 'warn'); return; }
    const formData = new FormData();
    formData.append('file', input.files[0]);
    document.getElementById('patron-upload-status').innerHTML = renderProgressBar({ label: 'Uploading...' });
    try {
      const resp = await fetch(`/api/v1/projects/${p.id}/patrons/upload`, { method: 'POST', body: formData });
      const r = await resp.json();
      if (resp.ok) {
        toast('File uploaded, parsing...', 'info');
        await refreshProject();
        setTimeout(renderPatronUpload, 2000);
      } else {
        document.getElementById('patron-upload-status').innerHTML = `<div class="alert alert-error">${esc(r.detail?.message || 'Upload failed')}</div>`;

    } catch(err) {
      document.getElementById('patron-upload-status').innerHTML = `<div class="alert alert-error">Upload failed</div>`;
    }
  });

  // Auto-refresh if any file is still parsing
  if (anyParsing) {
    setTimeout(renderPatronUpload, 2000);
  }

  // Load data preview for parsed files
  if (patronFiles.some(f => f.status === 'parsed') && !anyParsing) {
    _loadPatronPreview();
  }
}

      el.innerHTML = '<div class="text-dim" style="font-size:12px;padding:12px">No data to preview. Check that files have been parsed successfully.</div>';
      return;
    }

    const pageStart = _patronPreviewOffset + 1;
    const pageEnd = _patronPreviewOffset + preview.rows.length;
    const hasPrev = _patronPreviewOffset > 0;
    const hasNext = _patronPreviewOffset + _patronPreviewLimit < preview.total_rows;

    // Update nav
    const info = document.getElementById('patron-preview-info');
    const prevBtn = document.getElementById('patron-preview-prev');
    const nextBtn = document.getElementById('patron-preview-next');
    if (info) info.textContent = `Rows ${pageStart}\u2013${pageEnd} of ${preview.total_rows.toLocaleString()} \u00b7 ${preview.columns.length} columns`;
    if (prevBtn) prevBtn.disabled = !hasPrev;
    if (nextBtn) nextBtn.disabled = !hasNext;

    el.innerHTML = `
      <div style="overflow-x:auto;max-height:500px;border:1px solid var(--border);border-radius:6px">
        <table class="data-table" style="font-size:11px;width:100%">
          <thead><tr>${preview.columns.map(c =>
            `<th style="white-space:nowrap;position:sticky;top:0;background:var(--bg-card,#1e1e2e);z-index:1">${esc(c)}</th>`
          ).join('')}</tr></thead>
          <tbody>${preview.rows.length ? preview.rows.map(row =>
            `<tr>${preview.columns.map(c =>
              `<td class="mono" style="white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis">${esc(row[c] || '')}</td>`
            ).join('')}</tr>`
          ).join('') : `<tr><td colspan="${preview.columns.length}" class="text-dim" style="text-align:center;padding:20px">No rows</td></tr>`}</tbody>
        </table>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="text-dim" style="font-size:12px;padding:12px">Failed to load preview: ${esc(e.message || 'unknown error')}</div>`;
    console.error('Patron preview error:', e);
  }

// Encode transform_type + config into a single select value, decode on save
function _encodeTransform(type, config) {
  if (type === 'split' && config) {
    return `split|${config.index ?? 0}|${config.delimiter ?? ' '}`;
  }
  return type || 'copy';
}
function _decodeTransform(val) {
  if (val && val.startsWith('split|')) {
    const parts = val.split('|');
    return { transform_type: 'split', transform_config: { index: parseInt(parts[1]) || 0, delimiter: parts[2] ?? ' ' } };
  }
  return { transform_type: val || 'copy', transform_config: null };
}

// Cached maps data so inline changes don't require full re-render

let _patronSourceColumns = []; // source columns from uploaded files

async function renderPatronMapping() {
  const p = state.currentProject;
  const wrap = document.getElementById('patron-tab');

    wrap.innerHTML = `

}

function _transformOptions(selectedEncoded) {

function _transformNeedsConfig(type) {
  return type === 'regex' || type === 'const' || type === 'split';
}

function _transformConfigSummary(m) {
  const cfg = m.transform_config || {};
  if (m.transform_type === 'regex') {
    if (cfg.pattern) return `s/${cfg.pattern}/${cfg.replacement || ''}/`;
    return 'configure...';
  }
  if (m.transform_type === 'const') {
    if (cfg.value) return `"${cfg.value}"`;
    return 'configure...';
  }
  if (m.transform_type === 'split') {
    const d = cfg.delimiter === ' ' ? 'space' : cfg.delimiter === ',' ? 'comma' : `"${cfg.delimiter || ' '}"`;
    return `part ${(cfg.index ?? 0) + 1} by ${d}`;
  }
  return '';
}

  const encodedTransform = _encodeTransform(m.transform_type, m.transform_config);
  const needsConfig = _transformNeedsConfig(m.transform_type);

  return `<tr data-map-id="${esc(m.id)}">
